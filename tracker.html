<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Theme defaults — these are immediately overridden by applyTheme() at script start */
    :root {
      --c-bg: #FBEDF1;
      --c-surface: #FFF5F8;
      --c-ink: #3D2638;
      --f-display: 'Fraunces', Georgia, serif;

    }
    html, body { background: var(--c-bg); }
    body {
      font-family: var(--f-body);
      color: var(--c-ink);
      -webkit-tap-highlight-color: transparent;
    }

      cursor: pointer;
    }

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /* ── Supabase config ───────────────────────────────────────────────── */
    const SUPABASE_URL = "https://oubfzwqbcjainmeefqpb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_jr6gAFb0h-7s922GWpYlHQ_eA1XKDgk";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true },
    });
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    /* ── Storage shim: window.storage API backed by Supabase ─────────────
       Existing app code reads/writes one blob at key "goals-data".
       We translate that blob to/from normalized Supabase tables on the fly,
       so no other app code needs to change. ──────────────────────────── */

    const blobToRows = (blob, userId) => {
      const habits = [];
      const milestones = [];
      const checkIns = [];
      const resets = [];
      for (const g of blob.goals || []) {
        habits.push({
          id: g.id,
          user_id: userId,
          name: g.name,
          description: g.description || null,
          created_at: g.createdAt,
          attempt_start: g.attemptStart || g.createdAt,
          miss_rate_threshold: g.missRateThreshold ?? 0.30,
          habit_type: g.habitType || "daily",
          unit: g.unit || null,
          end_date: g.endDate || null,
        });
        for (const m of g.milestones || []) {
          milestones.push({
            id: m.id,
            habit_id: g.id,
            user_id: userId,
            day: m.day,
            reward: m.reward || "",
            claimed: !!m.claimed,
            claimed_at: m.claimedAt || null,
          });
        }
        // checkIns may be an array of strings (legacy) or objects with date+amount
        // Look up amount from the goal's checkInAmounts map if present.
        for (const c of g.checkIns || []) {
          const dateStr = typeof c === "string" ? c : c.date;
          const amount = (g.checkInAmounts && g.checkInAmounts[dateStr] != null)
            ? Number(g.checkInAmounts[dateStr])
            : (typeof c === "object" && c.amount != null ? Number(c.amount) : 1);
          checkIns.push({ habit_id: g.id, user_id: userId, date: dateStr, amount });
        }
        for (const r of g.attemptResets || []) {
          resets.push({
            habit_id: g.id,
            user_id: userId,
            date: r.date,
            previous_start: r.previousStart,
            elapsed_days: r.elapsedDays,
            completed_days: r.completedDays,
            missed_days: r.missedDays,
            miss_rate: r.missRate,
            threshold: r.threshold ?? 0.30,
          });
        }
      }
      return { habits, milestones, checkIns, resets };
    };

    const rowsToBlob = ({ habits, milestones, checkIns, resets }) => {
      const byHabit = new Map();
      for (const h of habits) {
        byHabit.set(h.id, {
          id: h.id,
          name: h.name,
          description: h.description || "",
          createdAt: h.created_at,
          attemptStart: h.attempt_start,
          missRateThreshold: Number(h.miss_rate_threshold),
          habitType: h.habit_type || "daily",
          unit: h.unit || null,
          endDate: h.end_date || null,
          milestones: [],
          checkIns: [],
          checkInAmounts: {}, // date -> amount, for quantitative habits
          attemptResets: [],
        });
      }
      for (const m of milestones) {
        const g = byHabit.get(m.habit_id);
        if (!g) continue;
        g.milestones.push({
          id: m.id,
          day: m.day,
          reward: m.reward || "",
          claimed: !!m.claimed,
          claimedAt: m.claimed_at,
        });
      }
      for (const c of checkIns) {
        const g = byHabit.get(c.habit_id);
        if (!g) continue;
        g.checkIns.push(c.date);
        g.checkInAmounts[c.date] = Number(c.amount ?? 1);
      }
      for (const r of resets) {
        const g = byHabit.get(r.habit_id);
        if (!g) continue;
        g.attemptResets.push({
          date: r.date,
          previousStart: r.previous_start,
          elapsedDays: r.elapsed_days,
          completedDays: r.completed_days,
          missedDays: r.missed_days,
          missRate: Number(r.miss_rate),
          threshold: Number(r.threshold),
        });
      }
      return { goals: Array.from(byHabit.values()) };
    };

    const fetchAllRows = async (userId) => {
      const [h, m, c, r] = await Promise.all([
        supabaseClient.from("habits").select("*").eq("user_id", userId),
        supabaseClient.from("milestones").select("*").eq("user_id", userId),
        supabaseClient.from("check_ins").select("*").eq("user_id", userId),
        supabaseClient.from("attempt_resets").select("*").eq("user_id", userId),
      ]);
      if (h.error) throw h.error;
      if (m.error) throw m.error;
      if (c.error) throw c.error;
      if (r.error) throw r.error;
      return {
        habits: h.data || [],
        milestones: m.data || [],
        checkIns: c.data || [],
        resets: r.data || [],
      };
    };

    /* Whole-blob replace strategy: when the app calls storage.set, we wipe
       the user's tables and re-insert. Simple, correct, and matches how the
       app already thinks about the data (one blob). On a habit tracker with
       a few habits and a few hundred check-ins this is well under 100ms. */
    const replaceAllRows = async (userId, blob) => {
      const { habits, milestones, checkIns, resets } = blobToRows(blob, userId);

      // Delete in dependency-safe order (children first)
      const dels = await Promise.all([
        supabaseClient.from("attempt_resets").delete().eq("user_id", userId),
        supabaseClient.from("check_ins").delete().eq("user_id", userId),
        supabaseClient.from("milestones").delete().eq("user_id", userId),
      ]);
      for (const d of dels) if (d.error) throw d.error;
      const habitDel = await supabaseClient.from("habits").delete().eq("user_id", userId);
      if (habitDel.error) throw habitDel.error;

      // Insert in dependency-safe order (parents first)
      if (habits.length) {
        const { error } = await supabaseClient.from("habits").insert(habits);
        if (error) throw error;
      }
      if (milestones.length) {
        const { error } = await supabaseClient.from("milestones").insert(milestones);
        if (error) throw error;
      }
      if (checkIns.length) {
        const { error } = await supabaseClient.from("check_ins").insert(checkIns);
        if (error) throw error;
      }
      if (resets.length) {
        const { error } = await supabaseClient.from("attempt_resets").insert(resets);
        if (error) throw error;
      }
    };

    const getCurrentUserId = async () => {
      const { data } = await supabaseClient.auth.getSession();
      return data.session?.user?.id || null;
    };

    /* ── Sync status (global, listenable) ─────────────────────────────────
       The HealthButton subscribes to window.__syncStatus__ to show real-time
       state. Every storage.set updates lastOk on success or lastErr on fail. */
    window.__syncStatus__ = {
      lastOk: null,
      lastErr: null,
      inFlight: 0,
      subscribers: new Set(),
    };
    const notifySync = () => {
      for (const fn of window.__syncStatus__.subscribers) {
        try { fn(); } catch (e) {}
      }
    };

    /* ── Safety state ──────────────────────────────────────────────────────
       Gates and tracking that prevent catastrophic writes (e.g. saving an
       empty blob over a populated cloud, or saving before initial fetch
       completes).                                                          */
    window.__safety__ = {
      initialLoadOk: false,        // becomes true only after a successful fetch
      lastKnownGoalCount: null,    // last count seen via load or save
      schemaOk: null,              // null=unchecked, true=ok, false=mismatch
      schemaErrorMsg: null,
    };

    /* Verify the database has the columns the app expects. Runs once on
       first load. If anything's missing, sets schemaOk=false and refuses
       all subsequent saves (read-only mode).                             */
    const verifySchema = async (userId) => {
      try {
        // Touch every required column with explicit names — fails loudly if absent
        const { error: hErr } = await supabaseClient
          .from("habits")
          .select("id,user_id,name,description,created_at,attempt_start,miss_rate_threshold,habit_type,unit,end_date")
          .eq("user_id", userId)
          .limit(1);
        if (hErr) throw new Error(`habits: ${hErr.message}`);
        const { error: cErr } = await supabaseClient
          .from("check_ins")
          .select("habit_id,user_id,date,amount")
          .eq("user_id", userId)
          .limit(1);
        if (cErr) throw new Error(`check_ins: ${cErr.message}`);
        window.__safety__.schemaOk = true;
        window.__safety__.schemaErrorMsg = null;
        return true;
      } catch (e) {
        window.__safety__.schemaOk = false;
        window.__safety__.schemaErrorMsg = e.message || String(e);
        return false;
      }
    };

    /* Stash a snapshot of cloud state to localStorage before any save.
       Keeps the last 3 snapshots so accidental wipes are recoverable.   */
    const snapshotToLocal = (userId, blob) => {
      try {
        const key = `goals-snapshot:${userId}`;
        const existing = JSON.parse(localStorage.getItem(key) || "[]");
        existing.unshift({ at: new Date().toISOString(), blob });
        const trimmed = existing.slice(0, 3);
        localStorage.setItem(key, JSON.stringify(trimmed));
      } catch (e) { /* localStorage might be full — non-fatal */ }
    };

    window.storage = {
      async get(key) {
        if (key !== "goals-data") return null;
        const userId = await getCurrentUserId();
        if (!userId) return null;

        // First load: verify schema before trusting anything
        if (window.__safety__.schemaOk === null) {
          await verifySchema(userId);
        }
        if (window.__safety__.schemaOk === false) {
          throw new Error(
            `Database schema is out of date. Migration not run? ` +
            `Details: ${window.__safety__.schemaErrorMsg}`
          );
        }

        const rows = await fetchAllRows(userId);
        const blob = rowsToBlob(rows);
        // Mark initial load complete and remember the count
        window.__safety__.initialLoadOk = true;
        window.__safety__.lastKnownGoalCount = (blob.goals || []).length;
        // Stash a fresh snapshot so we have a known-good baseline
        snapshotToLocal(userId, blob);
        return { key, value: JSON.stringify(blob), shared: false };
      },

      async set(key, value, options = {}) {
        if (key !== "goals-data") return null;
        const userId = await getCurrentUserId();
        if (!userId) throw new Error("Not signed in");

        // Guard 1: refuse if schema isn't verified
        if (window.__safety__.schemaOk !== true) {
          throw new Error(
            "Refusing to save: database schema check has not passed. " +
            "Reload the page and check for migration errors."
          );
        }

        // Guard 2: refuse if initial load never completed
        if (!window.__safety__.initialLoadOk) {
          throw new Error(
            "Refusing to save: initial cloud load has not completed yet. " +
            "Reload the page."
          );
        }

        const blob = JSON.parse(value);
        const newCount = (blob.goals || []).length;
        const prevCount = window.__safety__.lastKnownGoalCount;

        // Guard 3: refuse to wipe everything in one save unless explicitly OK'd
        if (newCount === 0 && prevCount > 0 && !options.allowWipe) {
          throw new Error(
            `Refusing to save 0 habits when ${prevCount} existed. ` +
            `If this is intentional, use the explicit clear-all action.`
          );
        }
        // Guard 4: refuse a >50% drop in habit count without confirmation
        if (prevCount > 1 && newCount < prevCount / 2 && !options.allowDrop) {
          throw new Error(
            `Refusing to save: habit count dropping from ${prevCount} to ${newCount}. ` +
            `Suspicious. If intentional, pass options.allowDrop = true.`
          );
        }

        // Snapshot BEFORE write so we can recover if something goes wrong
        snapshotToLocal(userId, blob);

        window.__syncStatus__.inFlight++;
        notifySync();
        try {
          await replaceAllRows(userId, blob);
          window.__syncStatus__.lastOk = new Date().toISOString();
          window.__syncStatus__.lastErr = null;
          window.__safety__.lastKnownGoalCount = newCount;
        } catch (err) {
          window.__syncStatus__.lastErr = {
            time: new Date().toISOString(),
            message: err.message || String(err),
          };
          throw err;
        } finally {
          window.__syncStatus__.inFlight--;
          notifySync();
        }
        try { localStorage.setItem("goals-data-cache", value); } catch (e) {}
        return { key, value, shared: false };
      },

      async delete(key) {
        if (key !== "goals-data") return null;
        const userId = await getCurrentUserId();
        if (!userId) return null;
        // Explicit delete bypasses guards via allowWipe flag
        await replaceAllRows(userId, { goals: [] });
        try { localStorage.removeItem("goals-data-cache"); } catch (e) {}
        return { key, deleted: true, shared: false };
      },

      async list() {
        return { keys: ["goals-data"], prefix: "", shared: false };
      },
    };

    /* ── Recovery helper ──────────────────────────────────────────────────
       If something does go wrong, you can run window.recoverFromSnapshot()
       in the browser console to restore from the most recent local backup.
       Returns { snapshots, restore(idx) }.                                */
    window.recoverFromSnapshot = async () => {
      const userId = await getCurrentUserId();
      if (!userId) { console.error("Not signed in"); return null; }
      const key = `goals-snapshot:${userId}`;
      const snapshots = JSON.parse(localStorage.getItem(key) || "[]");
      if (snapshots.length === 0) {
        console.log("No local snapshots available.");
        return { snapshots: [], restore: () => null };
      }
      console.table(snapshots.map((s, i) => ({
        index: i,
        savedAt: s.at,
        habits: (s.blob.goals || []).length,
      })));
      console.log("To restore, run: await window.recoverFromSnapshot().restore(0)");
      return {
        snapshots,
        restore: async (idx = 0) => {
          const target = snapshots[idx];
          if (!target) { console.error("No snapshot at index", idx); return; }
          await replaceAllRows(userId, target.blob);
          window.__safety__.lastKnownGoalCount = (target.blob.goals || []).length;
          console.log(`Restored ${(target.blob.goals || []).length} habits from ${target.at}`);
          window.location.reload();
        },
      };
    };

    /* ── Inlined Lucide icons (matching lucide-react component API) ─────── */
    const makeIcon = (paths) => ({ size = 24, strokeWidth = 2, style, className, ...rest }) => (
      <svg
        width={size}
        height={size}
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth={strokeWidth}
        strokeLinecap="round"
        strokeLinejoin="round"
        style={style}
        className={className}
        dangerouslySetInnerHTML={{ __html: paths }}
        {...rest}
      />
    );

    const Plus         = makeIcon('<path d="M5 12h14"/><path d="M12 5v14"/>');
    const Check        = makeIcon('<path d="M20 6 9 17l-5-5"/>');
    const ChevronLeft  = makeIcon('<path d="m15 18-6-6 6-6"/>');
    const ChevronRight = makeIcon('<path d="m9 18 6-6-6-6"/>');
    const Gift         = makeIcon('<rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/>');
    const Flame        = makeIcon('<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>');
    const Trash2       = makeIcon('<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>');
    const Lock         = makeIcon('<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>');
    const Sparkles     = makeIcon('<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>');
    const Trophy       = makeIcon('<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>');
    const X            = makeIcon('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>');
    const CheckCircle2 = makeIcon('<path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/>');
    const Circle       = makeIcon('<circle cx="12" cy="12" r="10"/>');
    const Target       = makeIcon('<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>');
    const CalendarDays = makeIcon('<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>');
    const RotateCcw    = makeIcon('<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>');
    const Settings2    = makeIcon('<path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/>');
    const Edit3        = makeIcon('<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>');
    const Minimize2    = makeIcon('<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/>');
    const Maximize2    = makeIcon('<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/>');
    const Activity     = makeIcon('<path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.5.5 0 0 1-.96 0L9.24 2.18a.5.5 0 0 0-.96 0l-2.35 8.36A2 2 0 0 1 4 12H2"/>');
    const RefreshCw    = makeIcon('<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>');
    const AlertCircle  = makeIcon('<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>');

    /* ── App code (unchanged from goal_tracker.jsx) ──────────────────────── */


/* ── Theme system ──────────────────────────────────────────────────────
   palette and fonts return CSS-var references. The actual values come
   from :root variables set by the active theme. Switch themes = swap
   one stylesheet's worth of vars; every reference re-renders.        */
const palette = {
  bg: "var(--c-bg)",
  surface: "var(--c-surface)",
  surfaceDeep: "var(--c-surface-deep)",
  ink: "var(--c-ink)",
  inkSoft: "var(--c-ink-soft)",
  inkMuted: "var(--c-ink-muted)",
  accent: "var(--c-accent)",
  accentSoft: "var(--c-accent-soft)",
  amber: "var(--c-amber)",
  forest: "var(--c-forest)",
  border: "var(--c-border)",
  borderSoft: "var(--c-border-soft)",
};

const fonts = {
  display: "var(--f-display)",
  body: "var(--f-body)",
};

const THEMES = {
  soft: {
    label: "Soft",
    description: "Pastel pinks, serif accents",
    fontImport: "https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700&display=swap",
    vars: {
      "--c-bg": "#FBEDF1",
      "--c-surface": "#FFF5F8",
      "--c-surface-deep": "#F5DDE5",
      "--c-ink": "#3D2638",
      "--c-ink-soft": "#664756",
      "--c-ink-muted": "#9B7989",
      "--c-accent": "#D85F87",
      "--c-accent-soft": "#E68DA8",
      "--c-amber": "#ECCB6B",
      "--c-forest": "#6FA17B",
      "--c-border": "#E8C9D5",
      "--c-border-soft": "#F0DBE3",
      "--f-display": "'Fraunces', Georgia, serif",
      "--f-body": "'Manrope', system-ui, sans-serif",
    },
    habitColors: ["#E07A9E","#A693D6","#F39A88","#7AB8DB","#7BC9A0","#E8C566","#D283C2","#F5A78A"],
  },
  sharp: {
    label: "Sharp",
    description: "Slate, teal, geometric sans",
    fontImport: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap",
    vars: {

const DEFAULT_THEME = "soft";

const applyTheme = (themeKey) => {
  const theme = THEMES[themeKey] || THEMES[DEFAULT_THEME];
  const fontLinkId = `theme-font-${themeKey}`;
  if (!document.getElementById(fontLinkId)) {
    const link = document.createElement("link");
    link.id = fontLinkId;
    link.rel = "stylesheet";
    link.href = theme.fontImport;
    document.head.appendChild(link);
  }
  const root = document.documentElement;
  root.setAttribute("data-theme", themeKey);
  for (const [k, v] of Object.entries(theme.vars)) {
    root.style.setProperty(k, v);
  }
  try { localStorage.setItem("theme", themeKey); } catch (e) {}
  window.dispatchEvent(new CustomEvent("themechange", { detail: themeKey }));
};

const getStoredTheme = () => {
  try {
    const t = localStorage.getItem("theme");
    return THEMES[t] ? t : DEFAULT_THEME;
  } catch (e) { return DEFAULT_THEME; }
};

applyTheme(getStoredTheme());

const RESET_MIN_DAYS = 5;
const RESET_MISS_RATE = 0.30;

const todayStrPure = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};

const computeAttemptStats = (goal, today) => {
  const attemptStart = goal.attemptStart || goal.createdAt;
  const startDate = new Date(attemptStart + "T00:00:00");
  const todayDate = new Date(today + "T00:00:00");
  const elapsedDays = Math.max(
    1,
    Math.floor((todayDate - startDate) / 86400000) + 1
  );
  const completedDays = (goal.checkIns || []).filter((d) => d >= attemptStart).length;
  const missedDays = Math.max(0, elapsedDays - completedDays);
  const missRate = elapsedDays > 0 ? missedDays / elapsedDays : 0;
  return { attemptStart, elapsedDays, completedDays, missedDays, missRate };
};

const computeReset = (goal, today) => {
  // Replays the habit's entire timeline from createdAt to today, recomputing every
  // reset event as if the current check-ins and claim dates were always the truth.
  // This means adding a forgotten check-in (or removing a wrongly-marked one) flows
  // through the whole history — old resets can be erased, new ones can appear,
  // and the current attemptStart adjusts to whatever the math actually says.
  const threshold = goal.missRateThreshold ?? RESET_MISS_RATE;
  const checkInsSet = new Set(goal.checkIns || []);
  const claimDates = new Set(
    (goal.milestones || [])
      .filter((m) => m.claimed && m.claimedAt)
      .map((m) => m.claimedAt)
  );

  const formatDate = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  };

  const createdAt = goal.createdAt || today;
  const startD = new Date(createdAt + "T00:00:00");
  const endD = new Date(today + "T00:00:00");

  let attemptStart = createdAt;
  const newResets = [];

  // Future-start habit: nothing to replay yet
  if (endD < startD) {
    if (
      attemptStart === (goal.attemptStart || createdAt) &&
      (goal.attemptResets || []).length === 0
    ) {
      return null;
    }
    return { ...goal, attemptStart, attemptResets: [] };
  }

  let dayIndex = 0;
  let attemptStartIndex = 0;
  let totalCheckIns = 0;
  let attemptStartCheckIns = 0;

  for (let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)) {
    const dStr = formatDate(d);

    // Claims advance attemptStart at the start of the day.
    // (Claiming a milestone on day X starts the next attempt from day X.)
    if (claimDates.has(dStr)) {
      attemptStart = dStr;
      attemptStartIndex = dayIndex;
      attemptStartCheckIns = totalCheckIns;
    }

    if (checkInsSet.has(dStr)) {
      totalCheckIns++;
    }

    // Evaluate the reset rule using state at the end of this day.
    const elapsedDays = dayIndex - attemptStartIndex + 1;
    if (elapsedDays >= RESET_MIN_DAYS) {
      const completed = totalCheckIns - attemptStartCheckIns;
      if (completed > 0) {
        const missed = elapsedDays - completed;
        const missRate = missed / elapsedDays;
        if (missRate > threshold) {
          newResets.push({
            date: dStr,
            previousStart: attemptStart,
            elapsedDays,
            completedDays: completed,
            missedDays: missed,
            missRate,
            threshold,
          });
          attemptStart = dStr;
          attemptStartIndex = dayIndex;
          // If today had a check-in, it counts as day 1 of the new attempt
          // (not double-counted into the failed one only).
          attemptStartCheckIns =
            totalCheckIns - (checkInsSet.has(dStr) ? 1 : 0);
        }
      }
    }

    dayIndex++;
  }

  // Skip the write if nothing changed.
  const currentStart = goal.attemptStart || createdAt;
  const currentResets = goal.attemptResets || [];
  const sameResets =
    newResets.length === currentResets.length &&
    newResets.every((r, i) => r.date === currentResets[i].date);
  if (attemptStart === currentStart && sameResets) {
    return null;
  }

  return { ...goal, attemptStart, attemptResets: newResets };
};

const computeEffectiveProgress = (goal) => {
  const attemptStart = goal.attemptStart || goal.createdAt;
  const baseline = (goal.milestones || [])
    .filter((m) => m.claimed)
    .reduce((max, m) => Math.max(max, m.day), 0);
  const isQuant = goal.habitType === "quantitative";
  const amounts = goal.checkInAmounts || {};
  const attemptCheckIns = (goal.checkIns || [])
    .filter((d) => d >= attemptStart)
    .reduce((sum, d) => sum + (isQuant ? Number(amounts[d] ?? 1) : 1), 0);
  return baseline + attemptCheckIns;
};

const getHabitColors = () => {
  const t = getStoredTheme();
  return THEMES[t]?.habitColors || THEMES.soft.habitColors;
};

const getHabitColor = (goalId, allGoals) => {
  const colors = getHabitColors();
  if (!allGoals || allGoals.length === 0) return colors[0];
  const idx = allGoals.findIndex((g) => g.id === goalId);
  return colors[(idx < 0 ? 0 : idx) % colors.length];
};

const addDays = (dateStr, n) => {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${mo}-${day}`;
};

const getMilestoneEvents = (goals, today) => {
  const events = [];
  for (const g of goals || []) {
    for (const m of g.milestones || []) {
      if (m.claimed && m.claimedAt) {
        events.push({ date: m.claimedAt, milestone: m, type: "earned", habit: g });
      }
    }
    const progress = computeEffectiveProgress(g);
    for (const m of g.milestones || []) {
      if (m.claimed) continue;
      if (progress >= m.day) continue;
      const daysAway = m.day - progress;
      const projDate = addDays(today, daysAway);
      events.push({ date: projDate, milestone: m, type: "projected", habit: g });
    }
  }
  return events;
};

const indexEventsByDate = (events) => {
  const idx = {};
  for (const e of events) {
    if (!idx[e.date]) idx[e.date] = [];
    idx[e.date].push(e);
  }
  return idx;
};

function GoalTracker() {
  const [goals, setGoals] = useState([]);
  const [view, setView] = useState("list");
  const [selectedGoalId, setSelectedGoalId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [celebration, setCelebration] = useState(null);
  const [quantityPrompt, setQuantityPrompt] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const [saveError, setSaveError] = useState(null);
  const [viewMode, setViewModeState] = useState(() => {
    try { return localStorage.getItem("viewMode") || "full"; } catch (e) { return "full"; }
  });
  const setViewMode = (m) => {
    setViewModeState(m);
    try { localStorage.setItem("viewMode", m); } catch (e) {}
  };

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("goals-data");
        if (result && result.value) {
          const data = JSON.parse(result.value);
          const loaded = data.goals || [];
          const today = todayStrPure();
          const evaluated = loaded.map((g) => computeReset(g, today) || g);
          setGoals(evaluated);
          if (evaluated.some((g, i) => g !== loaded[i])) {
            try {
              await window.storage.set(
                "goals-data",
                JSON.stringify({ goals: evaluated })
              );
            } catch (e) {
              setSaveError(e.message || String(e));
            }
          }
        }
      } catch (e) {
        // Distinguish "first run, no data" from real errors. Schema errors and
        // network errors must NOT be silently swallowed — they led to data loss
        // before. Surface them.
        const msg = e.message || String(e);
        if (msg.includes("schema is out of date") ||
            msg.includes("does not exist") ||
            msg.includes("PGRST")) {
          setLoadError(msg);
        }
        // Other errors (e.g. genuinely no rows) fall through to empty state
      }
      setLoading(false);
    })();
  }, []);

  const saveGoals = async (newGoals, intent = "normal") => {
    const today = todayStrPure();
    const evaluated = newGoals.map((g) => computeReset(g, today) || g);
    setGoals(evaluated);
    try {
      // intent === "delete" means the user explicitly removed habits;
      // bypass the empty/large-drop guards which exist to catch accidental wipes
      const options = intent === "delete"
        ? { allowWipe: true, allowDrop: true }
        : {};
      await window.storage.set(
        "goals-data",
        JSON.stringify({ goals: evaluated }),
        options
      );
      setSaveError(null);
    } catch (e) {
      console.error("Save failed", e);
      setSaveError(e.message || String(e));
    }
  };

  const todayStr = () => todayStrPure();

  const getProgress = (goal) => computeEffectiveProgress(goal);
  const getAttemptStats = (goal) => computeAttemptStats(goal, todayStr());
  const isCheckedInToday = (goal) => goal.checkIns?.includes(todayStr());

  const getStreak = (goal) => {
    if (!goal.checkIns || goal.checkIns.length === 0) return 0;
    const set = new Set(goal.checkIns);
    const cursor = new Date();
    cursor.setHours(0, 0, 0, 0);
    let streak = 0;
    const todayS = todayStr();
    if (!set.has(todayS)) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (true) {
      const y = cursor.getFullYear();
      const m = String(cursor.getMonth() + 1).padStart(2, "0");
      const day = String(cursor.getDate()).padStart(2, "0");
      const s = `${y}-${m}-${day}`;
      if (set.has(s)) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else break;
    }
    return streak;
  };

  const getSortedMilestones = (goal) =>
    [...(goal.milestones || [])].sort((a, b) => a.day - b.day);

  const getNextMilestone = (goal) => {
    const progress = getProgress(goal);
    return getSortedMilestones(goal).find((m) => m.day > progress);
  };

  const getReadyMilestones = (goal) => {
    const progress = getProgress(goal);
    return (goal.milestones || []).filter((m) => m.day <= progress && !m.claimed);
  };

  const handleCheckIn = async (goalId) => {
    const goal = goals.find((g) => g.id === goalId);
    if (!goal || isCheckedInToday(goal)) return;
    if (goal.habitType === "quantitative") {
      setQuantityPrompt({ goalId, dateStr: todayStr(), isToday: true });
      return;
    }
    const newGoals = goals.map((g) =>
      g.id !== goalId ? g : { ...g, checkIns: [...(g.checkIns || []), todayStr()] }
    );
    await saveGoals(newGoals);
    const updated = newGoals.find((g) => g.id === goalId);
    const newProgress = computeEffectiveProgress(updated);
    const justHit = (updated.milestones || []).find(
      (m) => m.day === newProgress && !m.claimed
    );
    if (justHit) {
      setCelebration({
        goalName: updated.name,
        reward: justHit.reward,
        goalId: updated.id,
        milestoneId: justHit.id,
      });
    }
  };

  const handleUndoCheckIn = async (goalId) => {
    const today = todayStr();
    const newGoals = goals.map((g) => {
      if (g.id !== goalId) return g;
      const newAmounts = { ...(g.checkInAmounts || {}) };
      delete newAmounts[today];
      return {
        ...g,
        checkIns: (g.checkIns || []).filter((d) => d !== today),
        checkInAmounts: newAmounts,
      };
    });
    await saveGoals(newGoals);
  };

  const handleToggleDay = async (goalId, dateStr) => {
    const goal = goals.find((g) => g.id === goalId);
    if (!goal) return;
    const checkIns = goal.checkIns || [];
    const has = checkIns.includes(dateStr);
    // Quantitative: tapping an unlogged day opens the modal; tapping a logged day removes it
    if (goal.habitType === "quantitative" && !has) {
      setQuantityPrompt({ goalId, dateStr, isToday: dateStr === todayStr() });
      return;
    }
    const newCheckIns = has
      ? checkIns.filter((d) => d !== dateStr)
      : [...checkIns, dateStr];
    const newGoals = goals.map((g) => {
      if (g.id !== goalId) return g;
      const newAmounts = { ...(g.checkInAmounts || {}) };
      if (has) delete newAmounts[dateStr];
      else newAmounts[dateStr] = 1; // daily check-in always counts as 1
      return { ...g, checkIns: newCheckIns, checkInAmounts: newAmounts };
    });
    await saveGoals(newGoals);

    // Only celebrate if we ADDED a check-in and it just hit a milestone
    if (!has) {
      const updated = newGoals.find((g) => g.id === goalId);
      const newProgress = computeEffectiveProgress(updated);
      const justHit = (updated.milestones || []).find(
        (m) => m.day === newProgress && !m.claimed
      );
      if (justHit) {
        setCelebration({
          goalName: updated.name,
          reward: justHit.reward,
          goalId: updated.id,
          milestoneId: justHit.id,
        });
      }
    }
  };

  // Called from the QuantityModal after user enters the amount
  const handleQuantitySubmit = async (amount) => {
    if (!quantityPrompt) return;
    const { goalId, dateStr } = quantityPrompt;
    const value = Number(amount);
    if (!Number.isFinite(value) || value <= 0) {
      setQuantityPrompt(null);
      return;
    }
    const newGoals = goals.map((g) => {
      if (g.id !== goalId) return g;
      const checkIns = g.checkIns || [];
      const has = checkIns.includes(dateStr);
      const newAmounts = { ...(g.checkInAmounts || {}) };
      newAmounts[dateStr] = value;
      return {
        ...g,
        checkIns: has ? checkIns : [...checkIns, dateStr],
        checkInAmounts: newAmounts,
      };
    });
    setQuantityPrompt(null);
    await saveGoals(newGoals);
    // Celebrate if we crossed a milestone
    const updated = newGoals.find((g) => g.id === goalId);
    const newProgress = computeEffectiveProgress(updated);
    const justHit = (updated.milestones || []).find(
      (m) => m.day <= newProgress && !m.claimed
    );
    if (justHit && newProgress >= justHit.day) {
      setCelebration({
        goalName: updated.name,
        reward: justHit.reward,
        goalId: updated.id,
        milestoneId: justHit.id,
      });
    }
  };

  const handleClaimReward = async (goalId, milestoneId) => {
    const today = todayStr();
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : {
            ...g,
            attemptStart: today,
            milestones: g.milestones.map((m) =>
              m.id === milestoneId
                ? { ...m, claimed: true, claimedAt: today }
                : m
            ),
          }
    );
    await saveGoals(newGoals);
  };

  const handleAddMilestone = async (goalId, milestone) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : {
            ...g,
            milestones: [...(g.milestones || []), milestone].sort(
              (a, b) => a.day - b.day
            ),
          }
    );
    await saveGoals(newGoals);
  };

  const handleDeleteMilestone = async (goalId, milestoneId) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : {
            ...g,
            milestones: (g.milestones || []).filter((m) => m.id !== milestoneId),
          }
    );
    await saveGoals(newGoals);
  };

  const handleUpdateThreshold = async (goalId, threshold) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId ? g : { ...g, missRateThreshold: threshold }
    );
    await saveGoals(newGoals);
  };

  const handleCreateGoal = async (goalData) => {
    const today = todayStr();
    const startDate = goalData.startDate || today;
    const { startDate: _ignored, ...rest } = goalData;
    const newGoal = {
      id: `goal_${Date.now()}`,
      ...rest,
      createdAt: startDate,
      attemptStart: startDate,
      checkIns: [],
      attemptResets: [],
    };
    await saveGoals([...goals, newGoal]);
    setSelectedGoalId(newGoal.id);
    setView("detail");
  };

  const handleDeleteGoal = async (goalId) => {
    await saveGoals(goals.filter((g) => g.id !== goalId), "delete");
    setView("list");
    setSelectedGoalId(null);
  };

  const handleUpdateGoal = async (goalId, patch) => {
    const newGoals = goals.map((g) => {
      if (g.id !== goalId) return g;
      const merged = { ...g, ...patch };
      // If milestones were edited, preserve claimed flags by id
      if (patch.milestones) {
        const oldById = Object.fromEntries((g.milestones || []).map((m) => [m.id, m]));
        merged.milestones = patch.milestones.map((m) => {
          const old = oldById[m.id];
          if (old && old.claimed) {
            return { ...m, claimed: true, claimedAt: old.claimedAt };
          }
          return { ...m, claimed: false, claimedAt: null };
        });
      }
      return merged;
    });
    await saveGoals(newGoals);
    setView("detail");
  };

  // Tap-to-check from compact list. Daily: toggle today. Quantitative: opens
  // the quantity modal for today (or undoes if already logged).
  const handleQuickToggle = async (goalId) => {
    const goal = goals.find((g) => g.id === goalId);
    if (!goal) return;
    const today = todayStr();
    const checkedIn = (goal.checkIns || []).includes(today);
    if (checkedIn) {
      // Undo today's entry, regardless of habit type
      const newGoals = goals.map((g) => {
        if (g.id !== goalId) return g;
        const newAmounts = { ...(g.checkInAmounts || {}) };
        delete newAmounts[today];
        return {
          ...g,
          checkIns: (g.checkIns || []).filter((d) => d !== today),
          checkInAmounts: newAmounts,
        };
      });
      await saveGoals(newGoals);
      return;
    }
    // Not yet done today — for quantitative habits, open the modal; for
    // daily, check in directly
    if (goal.habitType === "quantitative") {
      setQuantityPrompt({ goalId, dateStr: today, isToday: true });
    } else {
      await handleCheckIn(goalId);
    }
  };

  const selectedGoal = goals.find((g) => g.id === selectedGoalId);

  return (
    <div
      className="min-h-screen w-full"
      style={{
        background: palette.bg,
        color: palette.ink,
        fontFamily: fonts.body,
      }}
    >
      <style>{`
        .grain::before {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          opacity: 0.35;
          mix-blend-mode: multiply;
          background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.08 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }
        .ticker { font-variant-numeric: tabular-nums; }
        .display { font-family: var(--f-display); font-weight: 600; letter-spacing: -0.02em; }
        .display-italic { font-family: var(--f-display); font-style: italic; font-weight: 500; }
        /* In sharp/plain themes, italics on sans fonts look off — flatten to regular */
        :root[data-theme="sharp"] .display-italic,
        :root[data-theme="plain"] .display-italic {
          font-style: normal;
          font-weight: 500;
          letter-spacing: 0;
        }
        button { font-family: var(--f-body); }
        input, textarea, select { font-family: var(--f-body); }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .pop { animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes pop {
          0% { opacity: 0; transform: scale(0.85); }
          100% { opacity: 1; transform: scale(1); }
        }
      `}</style>

      <div className="relative grain max-w-3xl mx-auto px-6 pt-16 sm:pt-10 pb-10 md:py-14">
        {loadError ? (
          <div
            className="rounded-3xl p-6 md:p-8 my-12"
            style={{
              background: palette.surface,
              border: `2px solid ${palette.accent}`,
              color: palette.ink,
            }}
          >
            <div
              className="text-xs uppercase tracking-widest mb-2"
              style={{ color: palette.accent, letterSpacing: "0.2em" }}
            >
              ⚠ Can't load your habits safely
            </div>
            <h2 className="display text-2xl md:text-3xl mb-3">

          <CreateView

          />
        ) : view === "edit" && selectedGoal ? (
          <EditView
            goal={selectedGoal}

            onCancel={() => setView("detail")}

        ) : view === "detail" && selectedGoal ? (

            goal={selectedGoal}

            onBack={() => {

            onAddMilestone={(m) => handleAddMilestone(selectedGoal.id, m)}
            onDeleteMilestone={(mId) => handleDeleteMilestone(selectedGoal.id, mId)}

            onDelete={() => handleDeleteGoal(selectedGoal.id)}
            attemptStats={getAttemptStats(selectedGoal)}
            getProgress={getProgress}

      {quantityPrompt && (() => {
        const g = goals.find((x) => x.id === quantityPrompt.goalId);
        if (!g) return null;
        return (
          <QuantityModal
            goal={g}
            dateStr={quantityPrompt.dateStr}
            isToday={quantityPrompt.isToday}

            onClose={() => setQuantityPrompt(null)}

      {saveError && (
        <div
          className="fixed bottom-4 left-4 right-4 sm:left-auto sm:right-4 sm:max-w-md rounded-2xl p-4 shadow-xl z-40"

  );

/* ── CompactList ────────────────────────────────────────────────────────
   Compact dashboard view. Each habit is one row: color dot, name, optional
   streak/meta, and a check circle on the right. Tap the row to open the
   detail page; tap the circle to mark today done (or open the quantity
   modal for quantitative habits).                                       */
function CompactList({ goals, onSelect, onQuickToggle, getStreak, isCheckedInToday }) {
  const todayDoneCount = goals.filter((g) => isCheckedInToday(g)).length;
  const totalToday = goals.filter((g) => {
    // Habits whose start date is in the future shouldn't count toward "today's"
    const start = g.attemptStart || g.createdAt;
    const today = (() => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    })();
    return start <= today;
  }).length;

  return (
    <div>
      <div
        className="display-italic text-sm md:text-base mb-3 px-1"
        style={{ color: palette.inkSoft }}
      >
        <span className="ticker" style={{ color: palette.ink, fontWeight: 600 }}>
          {todayDoneCount}
        </span>{" "}
        of{" "}
        <span className="ticker" style={{ color: palette.ink, fontWeight: 600 }}>
          {totalToday}
        </span>{" "}
        done today
      </div>

      <div className="space-y-1.5">
        {goals.map((g) => {
          const color = getHabitColor(g.id, goals);
          const done = isCheckedInToday(g);
          const streak = getStreak(g);
          const start = g.attemptStart || g.createdAt;
          const todayDate = (() => {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");
            return `${y}-${m}-${day}`;
          })();
          const beforeStart = start > todayDate;

          // Compose meta text — keep it short
          const amounts = g.checkInAmounts || {};
          const todayAmount = done ? Number(amounts[todayDate] || 1) : 0;
          let meta = "";
          let metaColor = palette.inkMuted;
          if (beforeStart) {
            meta = `starts ${start}`;
          } else if (done && g.habitType === "quantitative" && todayAmount > 1) {
            meta = `+${todayAmount} ${g.unit || "items"}`;
            metaColor = palette.forest;
          } else if (done && streak > 1) {
            meta = `${streak}-day streak`;
            metaColor = palette.forest;
          } else if (!done && streak > 0) {
            meta = `${streak}-day streak`;
          }

          return (
            <div
              key={g.id}
              className="flex items-center gap-3 rounded-2xl pl-3 pr-2 py-2.5"
              style={{
                background: palette.surface,
                border: `1px solid ${palette.border}`,
              }}
            >
              <span
                className="w-2 h-2 rounded-full shrink-0"
                style={{ background: color }}
              />
              <button
                onClick={() => onSelect(g.id)}
                className="flex-1 min-w-0 text-left"
                style={{ background: "transparent" }}
              >
                <div className="flex items-baseline gap-2">
                  <span
                    className="display text-base truncate"
                    style={{
                      color: done ? palette.inkSoft : palette.ink,
                      fontWeight: 600,
                      textDecoration: done ? "line-through" : "none",
                      textDecorationColor: palette.inkMuted,
                    }}
                  >
                    {g.name}
                  </span>
                </div>
                {meta && (
                  <div className="text-xs leading-tight" style={{ color: metaColor }}>
                    {meta}
                  </div>
                )}
              </button>
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  if (!beforeStart) onQuickToggle(g.id);
                }}
                disabled={beforeStart}
                className="shrink-0 w-9 h-9 rounded-full flex items-center justify-center transition-transform active:scale-90"
                style={{
                  background: done ? palette.forest : "transparent",
                  border: done ? "none" : `1.5px solid ${palette.border}`,
                  color: done ? palette.surface : "transparent",
                  cursor: beforeStart ? "not-allowed" : "pointer",
                  opacity: beforeStart ? 0.4 : 1,
                }}
                aria-label={done ? "Undo today" : "Mark today done"}
                title={done ? "Undo today" : "Mark today done"}
              >
                {done && <Check size={16} strokeWidth={3} />}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            className="w-full rounded-2xl py-4 md:py-6 px-4 md:px-6 transition-all hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2 md:gap-3"
            style={{
              background: palette.ink,
              color: palette.bg,
            }}
          >
            <Circle size={20} strokeWidth={1.5} />
            <span className="display text-lg md:text-2xl">Mark today complete</span>
          </button>
        )}
      </div>

      {goal.habitType === "quantitative" && goal.endDate && (
        <DeadlineProgress goal={goal} progress={progress} />
      )}

      <AttemptPanel
        goal={goal}
        attemptStats={attemptStats}
        onUpdateThreshold={onUpdateThreshold}
      />

      <CalendarView goal={goal} allGoals={allGoals} onToggleDay={onToggleDay} />

      <section className="mb-10">
        <h2
          className="display text-2xl mb-1 flex items-center gap-2"
        >
          <Sparkles size={18} style={{ color: palette.accent }} /> Milestones
        </h2>
        <p
          className="display-italic text-sm mb-6"
          style={{ color: palette.inkMuted }}
        >
          Markers along the path. The habit goes on; these are the treats that pace it.
        </p>

        {sortedMilestones.length === 0 ? (
          <div
            className="rounded-2xl p-6 text-center mb-3"
            style={{
              background: palette.surface,
              border: `1px dashed ${palette.border}`,
              color: palette.inkMuted,
            }}
          >
            No milestones on this habit yet.
          </div>
        ) : (
          <div className="relative mb-3">
            <div
              className="absolute left-6 top-3 bottom-3 w-px"
              style={{ background: palette.border }}
            />
            <div className="space-y-3">
              {sortedMilestones.map((m) => {
                const reached = progress >= m.day;
                const isClaimable = reached && !m.claimed;
                const claimed = m.claimed;
                const remaining = m.day - progress;
                const isPendingDelete = pendingDeleteMilestoneId === m.id;
                return (
                  <div
                    key={m.id}
                    className="relative pl-16 pr-2 py-1"
                  >
                    <div
                      className="absolute left-2 top-2 w-9 h-9 rounded-full flex items-center justify-center"
                      style={{
                        background: claimed
                          ? palette.forest
                          : isClaimable
                          ? palette.amber
                          : palette.surfaceDeep,
                        color: claimed
                          ? palette.surface
                          : isClaimable
                          ? palette.ink
                          : palette.inkMuted,
                        border: `2px solid ${palette.bg}`,
                      }}
                    >
                      {claimed ? (
                        <Check size={16} strokeWidth={3} />
                      ) : isClaimable ? (
                        <Gift size={16} />
                      ) : (
                        <Lock size={14} />
                      )}
                    </div>
                    <div
                      className="rounded-2xl p-4 md:p-5 flex flex-col sm:flex-row sm:items-center gap-3"
                      style={{
                        background: claimed
                          ? palette.surfaceDeep
                          : palette.surface,
                        border: `1px solid ${
                          isClaimable ? palette.amber : palette.borderSoft
                        }`,
                        opacity: claimed ? 0.85 : 1,
                      }}
                    >
                      <div className="flex-1 min-w-0">
                        <div
                          className="text-[11px] uppercase tracking-widest mb-1"
                          style={{
                            color: palette.inkMuted,
                            letterSpacing: "0.18em",
                          }}
                        >
                          Day {m.day}
                          {!reached && (
                            <span
                              className="ml-2 ticker"
                              style={{ color: palette.accent }}
                            >
                              · {remaining} day{remaining !== 1 ? "s" : ""} left
                            </span>
                          )}
                          {claimed && m.claimedAt && (
                            <span className="ml-2" style={{ color: palette.forest }}>
                              · claimed {m.claimedAt}
                            </span>
                          )}
                        </div>
                        <div
                          className="display text-xl"
                          style={{
                            textDecoration: claimed ? "line-through" : "none",
                            textDecorationColor: palette.inkMuted,
                          }}
                        >
                          {m.reward}
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        {isClaimable && (
                          <button
                            onClick={() => onClaim(m.id)}
                            className="px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all hover:scale-105"
                            style={{
                              background: palette.accent,
                              color: palette.surface,
                            }}
                          >
                            Claim reward
                          </button>
                        )}
                        {!claimed && !isPendingDelete && (
                          <button
                            onClick={() => setPendingDeleteMilestoneId(m.id)}
                            className="w-8 h-8 rounded-full flex items-center justify-center transition-colors"
                            style={{
                              color: palette.inkMuted,
                              background: "transparent",
                            }}
                            aria-label="Remove milestone"
                            title="Remove milestone"
                          >
                            <X size={15} />
                          </button>
                        )}
                        {isPendingDelete && (
                          <div className="flex items-center gap-1.5 text-xs">
                            <span style={{ color: palette.accent }}>remove?</span>
                            <button
                              onClick={() => {
                                onDeleteMilestone(m.id);
                                setPendingDeleteMilestoneId(null);
                              }}
                              className="px-2.5 py-1 rounded-full"
                              style={{
                                background: palette.accent,
                                color: palette.surface,
                              }}
                            >
                              yes
                            </button>
                            <button
                              onClick={() => setPendingDeleteMilestoneId(null)}
                              className="px-2.5 py-1 rounded-full"
                              style={{
                                background: palette.surfaceDeep,
                                color: palette.inkSoft,
                              }}
                            >
                              no
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {addingMilestone ? (
          <div
            className="rounded-2xl p-4 md:p-5 fade-in"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.amber}`,
            }}
          >
            <div
              className="text-[11px] uppercase tracking-widest mb-3 flex items-center gap-1"
              style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
            >
              <Sparkles size={11} /> New milestone
            </div>
            <div className="grid grid-cols-12 gap-2 md:gap-3 items-center mb-3">
              <span
                className="col-span-2 text-sm text-right"
                style={{ color: palette.inkSoft }}
              >
                After
              </span>
              <input
                type="number"
                min="1"
                value={newMilestone.amount}
                onChange={(e) =>
                  setNewMilestone({
                    ...newMilestone,
                    amount: parseInt(e.target.value) || 0,
                  })
                }
                className="col-span-3 px-3 py-2.5 rounded-xl outline-none ticker"
                style={{
                  background: palette.bg,
                  border: `1px solid ${palette.borderSoft}`,
                  color: palette.ink,
                }}
              />
              <select
                value={newMilestone.unit}
                onChange={(e) =>
                  setNewMilestone({ ...newMilestone, unit: e.target.value })
                }
                className="col-span-3 px-3 py-2.5 rounded-xl outline-none"
                style={{
                  background: palette.bg,
                  border: `1px solid ${palette.borderSoft}`,
                  color: palette.ink,
                }}
              >
                <option value="days">days</option>
                <option value="weeks">weeks</option>
                <option value="months">months</option>
              </select>
              <span
                className="col-span-4 text-sm text-center display-italic"
                style={{ color: palette.inkMuted }}
              >
                = {Math.round(newMilestone.amount * unitToDays[newMilestone.unit])} day
                {Math.round(newMilestone.amount * unitToDays[newMilestone.unit]) !== 1 ? "s" : ""}
              </span>
            </div>
            <input
              value={newMilestone.reward}
              onChange={(e) =>
                setNewMilestone({ ...newMilestone, reward: e.target.value })
              }
              placeholder="Reward — e.g. ice cream, dinner out, a hotel night"
              className="w-full px-4 py-2.5 rounded-xl outline-none mb-3"
              style={{
                background: palette.bg,
                border: `1px solid ${palette.borderSoft}`,
                color: palette.ink,
              }}
            />
            <div className="flex gap-2 justify-end">
              <button
                onClick={() => {
                  setAddingMilestone(false);
                  setNewMilestone({ amount: 1, unit: "weeks", reward: "" });
                }}
                className="px-4 py-2 rounded-full text-sm"
                style={{
                  background: palette.surfaceDeep,
                  color: palette.inkSoft,
                }}
              >
                cancel
              </button>
              <button
                onClick={() => {
                  if (
                    !newMilestone.reward.trim() ||
                    newMilestone.amount < 1
                  )
                    return;
                  const day = Math.round(
                    newMilestone.amount * unitToDays[newMilestone.unit]
                  );
                  onAddMilestone({
                    id: `m_${Date.now()}_${Math.random()}`,
                    day,
                    reward: newMilestone.reward.trim(),
                    claimed: false,
                    claimedAt: null,
                  });
                  setNewMilestone({ amount: 1, unit: "weeks", reward: "" });
                  setAddingMilestone(false);
                }}
                disabled={
                  !newMilestone.reward.trim() || newMilestone.amount < 1
                }
                className="px-5 py-2 rounded-full text-sm font-medium transition-all disabled:opacity-40"
                style={{
                  background: palette.ink,
                  color: palette.bg,
                }}
              >
                Add milestone
              </button>
            </div>
          </div>
        ) : (
          <button
            onClick={() => setAddingMilestone(true)}
            className="w-full rounded-2xl py-4 flex items-center justify-center gap-2 transition-colors hover:bg-opacity-50"
            style={{
              background: "transparent",
              border: `1px dashed ${palette.border}`,
              color: palette.inkSoft,
            }}
          >
            <Plus size={16} /> Add a milestone
          </button>
        )}
      </section>

      <ResetHistory resets={goal.attemptResets || []} />

      <div
        className="rounded-2xl p-5 flex items-center justify-between"
        style={{ background: palette.surface, border: `1px solid ${palette.borderSoft}` }}
      >
        <div className="text-sm" style={{ color: palette.inkMuted }}>
          Stop tracking this habit?
        </div>
        {confirmDelete ? (
          <div className="flex gap-2 items-center">
            <span className="text-sm" style={{ color: palette.accent }}>
              Erase all check-ins?
            </span>
            <button
              onClick={onDelete}
              className="px-3 py-1.5 rounded-full text-sm"
              style={{ background: palette.accent, color: palette.surface }}
            >
              yes, delete
            </button>
            <button
              onClick={() => setConfirmDelete(false)}
              className="px-3 py-1.5 rounded-full text-sm"
              style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
            >
              cancel
            </button>
          </div>
        ) : (
          <button
            onClick={() => setConfirmDelete(true)}
            className="flex items-center gap-1 text-sm"
            style={{ color: palette.inkSoft }}
          >
            <Trash2 size={14} /> Delete
          </button>
        )}
      </div>
    </div>
  );
}

/* DeadlineProgress — for quantitative habits with an end date.
   Shows progress toward the largest milestone target (or just the count
   if no milestones), days remaining, and pace status (on track / behind). */
function DeadlineProgress({ goal, progress }) {
  const target = (() => {
    const ms = goal.milestones || [];
    if (ms.length === 0) return null;
    return Math.max(...ms.map((m) => m.day));
  })();
  const today = (() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  })();
  const start = goal.attemptStart || goal.createdAt;
  const end = goal.endDate;

  // Day counts (calendar days inclusive of start)
  const daysBetween = (a, b) => {
    const ms = (new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000;
    return Math.round(ms);
  };
  const totalDays = Math.max(1, daysBetween(start, end));
  const daysElapsed = Math.max(0, Math.min(totalDays, daysBetween(start, today)));
  const daysLeft = Math.max(0, daysBetween(today, end));
  const pastDeadline = today > end;
  const unit = goal.unit || "items";

  // Pace logic: if you have a target, compute what fraction of the target
  // you "should" have at this point in time, and compare to actual.
  let paceLabel = null;
  let paceColor = palette.inkMuted;
  if (target) {
    const expectedByNow = (target * daysElapsed) / totalDays;
    const ratio = progress / Math.max(1, expectedByNow);
    if (pastDeadline) {
      paceLabel = progress >= target ? "Goal reached 🌸" : "Deadline passed";
      paceColor = progress >= target ? palette.forest : palette.accent;
    } else if (progress >= target) {
      paceLabel = "Goal reached early 🌸";
      paceColor = palette.forest;
    } else if (ratio >= 0.95) {
      paceLabel = "On track";
      paceColor = palette.forest;
    } else if (ratio >= 0.7) {
      paceLabel = "Slightly behind";
      paceColor = palette.amber;
    } else {
      paceLabel = "Behind pace";
      paceColor = palette.accent;
    }
  }

  const pct = target ? Math.min(100, Math.round((progress / target) * 100)) : 0;
  const dailyNeeded = (target && !pastDeadline && daysLeft > 0 && progress < target)
    ? Math.ceil((target - progress) / daysLeft)
    : null;

  return (
    <div
      className="rounded-2xl md:rounded-3xl p-4 md:p-6 mb-5 md:mb-8"
      style={{
        background: palette.surface,
        border: `1px solid ${palette.border}`,
      }}
    >
      <div className="flex items-baseline justify-between gap-3 mb-3 flex-wrap">
        <div
          className="text-xs uppercase tracking-widest"
          style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
        >
          Deadline · {goal.endDate}
        </div>
        {paceLabel && (
          <div className="text-xs ticker" style={{ color: paceColor, fontWeight: 600 }}>
            {paceLabel}
          </div>
        )}
      </div>

      {target ? (
        <>
          <div className="flex items-baseline gap-2 mb-2">
            <span className="display text-2xl md:text-3xl ticker" style={{ color: palette.ink }}>
              {progress}
            </span>
            <span className="display-italic text-sm" style={{ color: palette.inkMuted }}>
              of {target} {unit}
            </span>
            <span className="ml-auto text-sm ticker" style={{ color: palette.inkSoft }}>
              {pct}%
            </span>
          </div>
          <div
            className="h-2 rounded-full overflow-hidden mb-3"
            style={{ background: palette.surfaceDeep }}
          >
            <div
              className="h-full rounded-full transition-all"
              style={{ background: paceColor, width: `${pct}%` }}
            />
          </div>
          <div className="flex items-center justify-between text-xs" style={{ color: palette.inkMuted }}>
            <span>
              {pastDeadline
                ? `${Math.abs(daysBetween(end, today))} day${Math.abs(daysBetween(end, today)) === 1 ? "" : "s"} past deadline`
                : `${daysLeft} day${daysLeft === 1 ? "" : "s"} left`}
            </span>
            {dailyNeeded != null && (
              <span className="display-italic">
                {dailyNeeded} {unit}/day to finish
              </span>
            )}
          </div>
        </>
      ) : (
        <div className="text-sm" style={{ color: palette.inkSoft }}>
          {pastDeadline
            ? `Deadline ${goal.endDate} has passed.`
            : `${daysLeft} day${daysLeft === 1 ? "" : "s"} left until ${goal.endDate}.`}
          <div className="display-italic mt-1 text-xs" style={{ color: palette.inkMuted }}>
            Add a milestone to set a target.
          </div>
        </div>
      )}
    </div>
  );
}

function CalendarView({ goal, allGoals, onToggleDay }) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayY = today.getFullYear();
  const todayM = today.getMonth();
  const todayD = today.getDate();
  const todayStr = (() => {
    const m = String(todayM + 1).padStart(2, "0");
    const d = String(todayD).padStart(2, "0");
    return `${todayY}-${m}-${d}`;
  })();

  const [viewDate, setViewDate] = useState({
    year: todayY,
    month: todayM,
  });

  const checkInsSet = new Set(goal.checkIns || []);

  const habitColor = getHabitColor(goal.id, allGoals || [goal]);
  const msEvents = getMilestoneEvents([goal], todayStr);
  const msByDate = indexEventsByDate(msEvents);

  const dateToStr = (year, month, day) => {
    const m = String(month + 1).padStart(2, "0");
    const d = String(day).padStart(2, "0");
    return `${year}-${m}-${d}`;
  };

  const monthLabel = new Date(viewDate.year, viewDate.month, 1).toLocaleString(
    "en-US",
    { month: "long", year: "numeric" }
  );

  const firstDayOfWeek = new Date(viewDate.year, viewDate.month, 1).getDay();
  const daysInMonth = new Date(
    viewDate.year,
    viewDate.month + 1,
    0
  ).getDate();

  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthPrefix = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}`;
  const monthCount = (goal.checkIns || []).filter((s) =>
    s.startsWith(monthPrefix)
  ).length;

  const goPrev = () => {
    const m = viewDate.month - 1;
    if (m < 0) setViewDate({ year: viewDate.year - 1, month: 11 });
    else setViewDate({ year: viewDate.year, month: m });
  };

  const goNext = () => {
    const m = viewDate.month + 1;
    if (m > 11) setViewDate({ year: viewDate.year + 1, month: 0 });
    else setViewDate({ year: viewDate.year, month: m });
  };

  const isFuture = (day) => {
    const cellDate = new Date(viewDate.year, viewDate.month, day);
    cellDate.setHours(0, 0, 0, 0);
    return cellDate > today;
  };

  const isBeforeStart = (day) => {
    const cellStr = dateToStr(viewDate.year, viewDate.month, day);
    return cellStr < (goal.createdAt || cellStr);
  };

  const isToday = (day) =>
    viewDate.year === todayY &&
    viewDate.month === todayM &&
    day === todayD;

  const dayLabels = ["S", "M", "T", "W", "T", "F", "S"];

  return (
    <section className="mb-10">
      <div className="flex items-end justify-between mb-1">
        <h2 className="display text-2xl flex items-center gap-2">
          <CalendarDays size={18} style={{ color: palette.accent }} /> Calendar
        </h2>
        <div
          className="text-sm display-italic"
          style={{ color: palette.inkSoft }}
        >
          <span className="ticker font-medium" style={{ color: palette.ink }}>
            {monthCount}
          </span>{" "}
          day{monthCount !== 1 ? "s" : ""} this month
        </div>
      </div>
      <p
        className="display-italic text-sm mb-5"
        style={{ color: palette.inkMuted }}
      >
        Tap any day to log it. The pattern is the proof.
      </p>

      <div
        className="rounded-3xl p-5 md:p-6"
        style={{
          background: palette.surface,
          border: `1px solid ${palette.border}`,
        }}
      >
        <div className="flex items-center justify-between mb-5">
          <button
            onClick={goPrev}
            className="w-9 h-9 rounded-full flex items-center justify-center transition-colors"
            style={{
              background: palette.surfaceDeep,
              color: palette.inkSoft,
            }}
            aria-label="Previous month"
          >
            <ChevronLeft size={18} />
          </button>
          <div className="display text-xl">{monthLabel}</div>
          <button
            onClick={goNext}
            className="w-9 h-9 rounded-full flex items-center justify-center transition-colors"
            style={{
              background: palette.surfaceDeep,
              color: palette.inkSoft,
            }}
            aria-label="Next month"
          >
            <ChevronRight size={18} />
          </button>
        </div>

        <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
          {dayLabels.map((d, i) => (
            <div
              key={i}
              className="text-center text-[10px] uppercase tracking-widest py-1"
              style={{
                color: palette.inkMuted,
                letterSpacing: "0.2em",
              }}
            >
              {d}
            </div>
          ))}
        </div>

        <div className="grid grid-cols-7 gap-1 md:gap-2">
          {cells.map((day, idx) => {
            if (day === null) {
              return <div key={idx} className="aspect-square" />;
            }
            const dStr = dateToStr(viewDate.year, viewDate.month, day);
            const completed = checkInsSet.has(dStr);
            const future = isFuture(day);
            const beforeStart = isBeforeStart(day);
            const locked = future || beforeStart;
            const today_ = isToday(day);
            const cellEvents = msByDate[dStr] || [];
            const earnedHere = cellEvents.find((e) => e.type === "earned");
            const projectedHere = cellEvents.find((e) => e.type === "projected");

            let bg = "transparent";
            let color = palette.ink;
            let border = `1px solid ${palette.borderSoft}`;

            if (completed) {
              bg = palette.forest;
              color = palette.surface;
              border = `1px solid ${palette.forest}`;
            } else if (locked) {
              bg = "transparent";
              color = palette.inkMuted;
              border = `1px dashed ${palette.borderSoft}`;
            } else {
              bg = palette.bg;
            }

            // Projected milestone styling overrides locked-future appearance
            if (projectedHere && !completed) {
              border = `1.5px dashed ${habitColor}`;
              bg = `${habitColor}14`; // ~8% alpha
              color = palette.ink;
            }
            // Earned overlay
            if (earnedHere) {
              border = `2px solid ${habitColor}`;
            }

            if (today_ && !completed && !projectedHere && !earnedHere) {
              border = `2px solid ${palette.accent}`;
            }

            return (
              <button
                key={idx}
                onClick={() => !locked && onToggleDay(dStr)}
                disabled={locked}
                className="aspect-square rounded-xl relative flex flex-col items-center justify-center transition-all"
                style={{
                  background: bg,
                  color,
                  border,
                  cursor: locked ? "not-allowed" : "pointer",
                  opacity: locked && !projectedHere ? 0.4 : 1,
                }}
                title={
                  earnedHere
                    ? `Earned: ${earnedHere.milestone.reward}`
                    : projectedHere
                    ? `Projected: ${projectedHere.milestone.reward}`
                    : undefined
                }
              >
                <span
                  className="ticker text-sm md:text-base"
                  style={{ fontWeight: today_ ? 600 : 400 }}
                >
                  {day}
                </span>
                {completed && !earnedHere && (
                  <Check
                    size={10}
                    strokeWidth={3}
                    style={{ marginTop: 1, opacity: 0.85 }}
                  />
                )}
                {earnedHere && (
                  <span
                    style={{
                      position: "absolute",
                      top: -5,
                      right: -5,
                      width: 16,
                      height: 16,
                      borderRadius: "50%",
                      background: habitColor,
                      color: palette.surface,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      border: `2px solid ${palette.surface}`,
                    }}
                  >
                    <Gift size={8} strokeWidth={2.5} />
                  </span>
                )}
                {projectedHere && !earnedHere && (
                  <span
                    style={{
                      position: "absolute",
                      bottom: 2,
                      left: 2,
                      right: 2,
                      fontSize: 8,
                      lineHeight: 1,
                      color: habitColor,
                      fontWeight: 500,
                      textAlign: "center",
                      overflow: "hidden",
                      textOverflow: "ellipsis",
                      whiteSpace: "nowrap",
                    }}
                  >
                    {projectedHere.milestone.reward}
                  </span>
                )}
