  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ── Storage shim: window.storage API backed by Supabase ─────────────
       Existing app code reads/writes one blob at key "goals-data".
       We translate that blob to/from normalized Supabase tables on the fly,
       so no other app code needs to change. ──────────────────────────── */

    const blobToRows = (blob, userId) => {
      const habits = [];
      const milestones = [];
      const checkIns = [];
      const resets = [];
      for (const g of blob.goals || []) {
        habits.push({
          id: g.id,
          user_id: userId,
          name: g.name,
          description: g.description || null,
          created_at: g.createdAt,
          attempt_start: g.attemptStart || g.createdAt,
          miss_rate_threshold: g.missRateThreshold ?? 0.30,
        });
        for (const m of g.milestones || []) {
          milestones.push({
            id: m.id,
            habit_id: g.id,
            user_id: userId,
            day: m.day,
            reward: m.reward,
            claimed: !!m.claimed,
            claimed_at: m.claimedAt || null,
          });
        }
        for (const d of g.checkIns || []) {
          checkIns.push({ habit_id: g.id, user_id: userId, date: d });
        }
        for (const r of g.attemptResets || []) {
          resets.push({
            habit_id: g.id,
            user_id: userId,
            date: r.date,
            previous_start: r.previousStart,
            elapsed_days: r.elapsedDays,
            completed_days: r.completedDays,
            missed_days: r.missedDays,
            miss_rate: r.missRate,
            threshold: r.threshold ?? 0.30,
          });
        }
      }
      return { habits, milestones, checkIns, resets };
    };

    const rowsToBlob = ({ habits, milestones, checkIns, resets }) => {
      const byHabit = new Map();
      for (const h of habits) {
        byHabit.set(h.id, {
          id: h.id,
          name: h.name,
          description: h.description || "",
          createdAt: h.created_at,
          attemptStart: h.attempt_start,
          missRateThreshold: Number(h.miss_rate_threshold),
          milestones: [],
          checkIns: [],
          attemptResets: [],
        });
      }
      for (const m of milestones) {
        const g = byHabit.get(m.habit_id);
        if (!g) continue;
        g.milestones.push({
          id: m.id,
          day: m.day,
          reward: m.reward,
          claimed: !!m.claimed,
          claimedAt: m.claimed_at,
        });
      }
      for (const c of checkIns) {
        const g = byHabit.get(c.habit_id);
        if (!g) continue;
        g.checkIns.push(c.date);
      }
      for (const r of resets) {
        const g = byHabit.get(r.habit_id);
        if (!g) continue;
        g.attemptResets.push({
          date: r.date,
          previousStart: r.previous_start,
          elapsedDays: r.elapsed_days,
          completedDays: r.completed_days,
          missedDays: r.missed_days,
          missRate: Number(r.miss_rate),
          threshold: Number(r.threshold),
        });
      }
      return { goals: Array.from(byHabit.values()) };
    };

    const fetchAllRows = async (userId) => {
      const [h, m, c, r] = await Promise.all([
        supabaseClient.from("habits").select("*").eq("user_id", userId),
        supabaseClient.from("milestones").select("*").eq("user_id", userId),
        supabaseClient.from("check_ins").select("*").eq("user_id", userId),
        supabaseClient.from("attempt_resets").select("*").eq("user_id", userId),
      ]);
      if (h.error) throw h.error;
      if (m.error) throw m.error;
      if (c.error) throw c.error;
      if (r.error) throw r.error;
      return {
        habits: h.data || [],
        milestones: m.data || [],
        checkIns: c.data || [],
        resets: r.data || [],
      };
    };

    /* Whole-blob replace strategy: when the app calls storage.set, we wipe
       the user's tables and re-insert. Simple, correct, and matches how the
       app already thinks about the data (one blob). On a habit tracker with
       a few habits and a few hundred check-ins this is well under 100ms. */
    const replaceAllRows = async (userId, blob) => {
      const { habits, milestones, checkIns, resets } = blobToRows(blob, userId);

      // Delete in dependency-safe order (children first)
      const dels = await Promise.all([
        supabaseClient.from("attempt_resets").delete().eq("user_id", userId),
        supabaseClient.from("check_ins").delete().eq("user_id", userId),
        supabaseClient.from("milestones").delete().eq("user_id", userId),
      ]);
      for (const d of dels) if (d.error) throw d.error;
      const habitDel = await supabaseClient.from("habits").delete().eq("user_id", userId);
      if (habitDel.error) throw habitDel.error;

      // Insert in dependency-safe order (parents first)
      if (habits.length) {
        const { error } = await supabaseClient.from("habits").insert(habits);
        if (error) throw error;
      }
      if (milestones.length) {
        const { error } = await supabaseClient.from("milestones").insert(milestones);
        if (error) throw error;
      }
      if (checkIns.length) {
        const { error } = await supabaseClient.from("check_ins").insert(checkIns);
        if (error) throw error;
      }
      if (resets.length) {
        const { error } = await supabaseClient.from("attempt_resets").insert(resets);
        if (error) throw error;
      }
    };

    const getCurrentUserId = async () => {
      const { data } = await supabaseClient.auth.getSession();
      return data.session?.user?.id || null;
    };

    window.storage = {
      async get(key) {
        if (key !== "goals-data") return null;
        const userId = await getCurrentUserId();
        if (!userId) return null;
        const rows = await fetchAllRows(userId);
        const blob = rowsToBlob(rows);
        return { key, value: JSON.stringify(blob), shared: false };
      },
      async set(key, value) {
        if (key !== "goals-data") return null;
        const userId = await getCurrentUserId();
        if (!userId) throw new Error("Not signed in");
        const blob = JSON.parse(value);
        await replaceAllRows(userId, blob);
        // Local cache as backup so app doesn't refetch on every save
        try { localStorage.setItem("goals-data-cache", value); } catch (e) {}
        return { key, value, shared: false };
      },
      async delete(key) {
        if (key !== "goals-data") return null;
        const userId = await getCurrentUserId();
        if (!userId) return null;
        await replaceAllRows(userId, { goals: [] });
        try { localStorage.removeItem("goals-data-cache"); } catch (e) {}
        return { key, deleted: true, shared: false };
      },
      async list() {
        return { keys: ["goals-data"], prefix: "", shared: false };
      },
    };

    /* ── Inlined Lucide icons (matching lucide-react component API) ─────── */

    const Check        = makeIcon('<path d="M20 6 9 17l-5-5"/>');
    const ChevronLeft  = makeIcon('<path d="m15 18-6-6 6-6"/>');
    const ChevronRight = makeIcon('<path d="m9 18 6-6-6-6"/>');
    const Gift         = makeIcon('<rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/>');
    const Flame        = makeIcon('<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>');

    const Lock         = makeIcon('<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>');
    const Sparkles     = makeIcon('<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>');
    const Trophy       = makeIcon('<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>');

const RESET_MIN_DAYS = 5;
const RESET_MISS_RATE = 0.30;

const todayStrPure = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};

const computeAttemptStats = (goal, today) => {
  const attemptStart = goal.attemptStart || goal.createdAt;
  const startDate = new Date(attemptStart + "T00:00:00");
  const todayDate = new Date(today + "T00:00:00");
  const elapsedDays = Math.max(
    1,
    Math.floor((todayDate - startDate) / 86400000) + 1
  );
  const completedDays = (goal.checkIns || []).filter((d) => d >= attemptStart).length;
  const missedDays = Math.max(0, elapsedDays - completedDays);
  const missRate = elapsedDays > 0 ? missedDays / elapsedDays : 0;
  return { attemptStart, elapsedDays, completedDays, missedDays, missRate };
};

const computeReset = (goal, today) => {
  // Replays the habit's entire timeline from createdAt to today, recomputing every
  // reset event as if the current check-ins and claim dates were always the truth.
  // This means adding a forgotten check-in (or removing a wrongly-marked one) flows
  // through the whole history — old resets can be erased, new ones can appear,
  // and the current attemptStart adjusts to whatever the math actually says.
  const threshold = goal.missRateThreshold ?? RESET_MISS_RATE;
  const checkInsSet = new Set(goal.checkIns || []);
  const claimDates = new Set(
    (goal.milestones || [])
      .filter((m) => m.claimed && m.claimedAt)
      .map((m) => m.claimedAt)
  );

  const formatDate = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  };

  const createdAt = goal.createdAt || today;
  const startD = new Date(createdAt + "T00:00:00");
  const endD = new Date(today + "T00:00:00");

  let attemptStart = createdAt;
  const newResets = [];

  // Future-start habit: nothing to replay yet
  if (endD < startD) {
    if (
      attemptStart === (goal.attemptStart || createdAt) &&
      (goal.attemptResets || []).length === 0
    ) {
      return null;
    }
    return { ...goal, attemptStart, attemptResets: [] };
  }

  let dayIndex = 0;
  let attemptStartIndex = 0;
  let totalCheckIns = 0;
  let attemptStartCheckIns = 0;

  for (let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)) {
    const dStr = formatDate(d);

    // Claims advance attemptStart at the start of the day.
    // (Claiming a milestone on day X starts the next attempt from day X.)
    if (claimDates.has(dStr)) {
      attemptStart = dStr;
      attemptStartIndex = dayIndex;
      attemptStartCheckIns = totalCheckIns;
    }

    if (checkInsSet.has(dStr)) {
      totalCheckIns++;
    }

    // Evaluate the reset rule using state at the end of this day.
    const elapsedDays = dayIndex - attemptStartIndex + 1;
    if (elapsedDays >= RESET_MIN_DAYS) {
      const completed = totalCheckIns - attemptStartCheckIns;
      if (completed > 0) {
        const missed = elapsedDays - completed;
        const missRate = missed / elapsedDays;
        if (missRate > threshold) {
          newResets.push({
            date: dStr,
            previousStart: attemptStart,
            elapsedDays,
            completedDays: completed,
            missedDays: missed,
            missRate,
            threshold,
          });
          attemptStart = dStr;
          attemptStartIndex = dayIndex;
          // If today had a check-in, it counts as day 1 of the new attempt
          // (not double-counted into the failed one only).
          attemptStartCheckIns =
            totalCheckIns - (checkInsSet.has(dStr) ? 1 : 0);
        }
      }
    }

    dayIndex++;
  }

  // Skip the write if nothing changed.
  const currentStart = goal.attemptStart || createdAt;
  const currentResets = goal.attemptResets || [];
  const sameResets =
    newResets.length === currentResets.length &&
    newResets.every((r, i) => r.date === currentResets[i].date);
  if (attemptStart === currentStart && sameResets) {
    return null;
  }

  return { ...goal, attemptStart, attemptResets: newResets };
};

const computeEffectiveProgress = (goal) => {
  const attemptStart = goal.attemptStart || goal.createdAt;
  const baseline = (goal.milestones || [])
    .filter((m) => m.claimed)
    .reduce((max, m) => Math.max(max, m.day), 0);
  const attemptCheckIns = (goal.checkIns || []).filter(
    (d) => d >= attemptStart
  ).length;
  return baseline + attemptCheckIns;
};

const getHabitColor = (goalId, allGoals) => {
  if (!allGoals || allGoals.length === 0) return HABIT_COLORS[0];
  const idx = allGoals.findIndex((g) => g.id === goalId);
  return HABIT_COLORS[(idx < 0 ? 0 : idx) % HABIT_COLORS.length];
};

const addDays = (dateStr, n) => {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${mo}-${day}`;
};

const getMilestoneEvents = (goals, today) => {
  const events = [];
  for (const g of goals || []) {
    for (const m of g.milestones || []) {
      if (m.claimed && m.claimedAt) {
        events.push({ date: m.claimedAt, milestone: m, type: "earned", habit: g });
      }
    }
    const progress = computeEffectiveProgress(g);
    for (const m of g.milestones || []) {
      if (m.claimed) continue;
      if (progress >= m.day) continue;
      const daysAway = m.day - progress;
      const projDate = addDays(today, daysAway);
      events.push({ date: projDate, milestone: m, type: "projected", habit: g });
    }
  }
  return events;
};

const indexEventsByDate = (events) => {
  const idx = {};
  for (const e of events) {
    if (!idx[e.date]) idx[e.date] = [];
    idx[e.date].push(e);
  }
  return idx;
};

function GoalTracker() {
  const [goals, setGoals] = useState([]);
  const [view, setView] = useState("list");
  const [selectedGoalId, setSelectedGoalId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [celebration, setCelebration] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("goals-data");
        if (result && result.value) {
          const data = JSON.parse(result.value);
          const loaded = data.goals || [];
          const today = todayStrPure();
          const evaluated = loaded.map((g) => computeReset(g, today) || g);
          setGoals(evaluated);
          // If any reset triggered while we were away, persist it
          if (evaluated.some((g, i) => g !== loaded[i])) {
            try {
              await window.storage.set(
                "goals-data",
                JSON.stringify({ goals: evaluated })
              );
            } catch (e) {
              // ignore
            }
          }
        }
      } catch (e) {
        // First run — no data yet
      }
      setLoading(false);
    })();
  }, []);

  const saveGoals = async (newGoals) => {
    const today = todayStrPure();
    const evaluated = newGoals.map((g) => computeReset(g, today) || g);
    setGoals(evaluated);
    try {
      await window.storage.set("goals-data", JSON.stringify({ goals: evaluated }));
    } catch (e) {
      console.error("Save failed", e);
    }
  };

  const todayStr = () => todayStrPure();

  const getProgress = (goal) => computeEffectiveProgress(goal);
  const getAttemptStats = (goal) => computeAttemptStats(goal, todayStr());
  const isCheckedInToday = (goal) => goal.checkIns?.includes(todayStr());

  const getStreak = (goal) => {
    if (!goal.checkIns || goal.checkIns.length === 0) return 0;
    const set = new Set(goal.checkIns);
    const cursor = new Date();
    cursor.setHours(0, 0, 0, 0);
    let streak = 0;
    const todayS = todayStr();
    if (!set.has(todayS)) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (true) {
      const y = cursor.getFullYear();
      const m = String(cursor.getMonth() + 1).padStart(2, "0");
      const day = String(cursor.getDate()).padStart(2, "0");
      const s = `${y}-${m}-${day}`;
      if (set.has(s)) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else break;
    }
    return streak;
  };

  const getSortedMilestones = (goal) =>
    [...(goal.milestones || [])].sort((a, b) => a.day - b.day);

  const getNextMilestone = (goal) => {
    const progress = getProgress(goal);
    return getSortedMilestones(goal).find((m) => m.day > progress);
  };

  const getReadyMilestones = (goal) => {
    const progress = getProgress(goal);
    return (goal.milestones || []).filter((m) => m.day <= progress && !m.claimed);
  };

  const handleCheckIn = async (goalId) => {
    const goal = goals.find((g) => g.id === goalId);
    if (!goal || isCheckedInToday(goal)) return;
    const newGoals = goals.map((g) =>
      g.id !== goalId ? g : { ...g, checkIns: [...(g.checkIns || []), todayStr()] }
    );
    await saveGoals(newGoals);
    const updated = newGoals.find((g) => g.id === goalId);
    const newProgress = computeEffectiveProgress(updated);
    const justHit = (updated.milestones || []).find(
      (m) => m.day === newProgress && !m.claimed
    );
    if (justHit) {
      setCelebration({
        goalName: updated.name,
        reward: justHit.reward,
        goalId: updated.id,
        milestoneId: justHit.id,
      });
    }
  };

  const handleUndoCheckIn = async (goalId) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : { ...g, checkIns: (g.checkIns || []).filter((d) => d !== todayStr()) }
    );
    await saveGoals(newGoals);
  };

  const handleToggleDay = async (goalId, dateStr) => {
    const goal = goals.find((g) => g.id === goalId);
    if (!goal) return;
    const checkIns = goal.checkIns || [];
    const has = checkIns.includes(dateStr);
    const newCheckIns = has
      ? checkIns.filter((d) => d !== dateStr)
      : [...checkIns, dateStr];
    const newGoals = goals.map((g) =>
      g.id !== goalId ? g : { ...g, checkIns: newCheckIns }
    );
    await saveGoals(newGoals);

    // Only celebrate if we ADDED a check-in and it just hit a milestone
    if (!has) {
      const updated = newGoals.find((g) => g.id === goalId);
      const newProgress = computeEffectiveProgress(updated);
      const justHit = (updated.milestones || []).find(
        (m) => m.day === newProgress && !m.claimed
      );
      if (justHit) {
        setCelebration({
          goalName: updated.name,
          reward: justHit.reward,
          goalId: updated.id,
          milestoneId: justHit.id,
        });
      }
    }
  };

  const handleClaimReward = async (goalId, milestoneId) => {
    const today = todayStr();
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : {
            ...g,
            attemptStart: today,
            milestones: g.milestones.map((m) =>
              m.id === milestoneId
                ? { ...m, claimed: true, claimedAt: today }
                : m
            ),
          }
    );
    await saveGoals(newGoals);
  };

  const handleAddMilestone = async (goalId, milestone) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : {
            ...g,
            milestones: [...(g.milestones || []), milestone].sort(
              (a, b) => a.day - b.day
            ),
          }
    );
    await saveGoals(newGoals);
  };

  const handleDeleteMilestone = async (goalId, milestoneId) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId
        ? g
        : {
            ...g,
            milestones: (g.milestones || []).filter((m) => m.id !== milestoneId),
          }
    );
    await saveGoals(newGoals);
  };

  const handleUpdateThreshold = async (goalId, threshold) => {
    const newGoals = goals.map((g) =>
      g.id !== goalId ? g : { ...g, missRateThreshold: threshold }
    );
    await saveGoals(newGoals);
  };

  const handleCreateGoal = async (goalData) => {
    const today = todayStr();
    const startDate = goalData.startDate || today;
    const { startDate: _ignored, ...rest } = goalData;
    const newGoal = {
      id: `goal_${Date.now()}`,
      ...rest,
      createdAt: startDate,
      attemptStart: startDate,
      checkIns: [],
      attemptResets: [],
    };
    await saveGoals([...goals, newGoal]);
    setSelectedGoalId(newGoal.id);
    setView("detail");
  };

  const handleDeleteGoal = async (goalId) => {
    await saveGoals(goals.filter((g) => g.id !== goalId));
    setView("list");
    setSelectedGoalId(null);
  };

  const selectedGoal = goals.find((g) => g.id === selectedGoalId);

  return (
    <div
      className="min-h-screen w-full"
      style={{
        background: palette.bg,
        color: palette.ink,
        fontFamily: fonts.body,
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700&display=swap');
        .grain::before {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          opacity: 0.35;
          mix-blend-mode: multiply;
          background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.08 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }
        .ticker { font-variant-numeric: tabular-nums; }
        .display-italic { font-family: ${fonts.display}; font-style: italic; font-weight: 500; }
        .display { font-family: ${fonts.display}; font-weight: 600; letter-spacing: -0.02em; }
        button { font-family: ${fonts.body}; }
        input, textarea, select { font-family: ${fonts.body}; }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .pop { animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes pop {
          0% { opacity: 0; transform: scale(0.85); }
          100% { opacity: 1; transform: scale(1); }
        }
      `}</style>

      <div className="relative grain max-w-3xl mx-auto px-6 py-10 md:py-14">
        {loading ? (
          <div
            className="text-center py-20 display-italic text-2xl"
            style={{ color: palette.inkMuted }}
          >
            opening your journal…
          </div>
        ) : view === "list" ? (
          <ListView
            goals={goals}
            onSelect={(id) => {
              setSelectedGoalId(id);
              setView("detail");
            }}
            onCreate={() => setView("create")}
            onOpenCalendar={() => setView("calendar")}
            onOpenRewards={() => setView("rewards")}
            getProgress={getProgress}
            getStreak={getStreak}
            getNextMilestone={getNextMilestone}
            getReadyMilestones={getReadyMilestones}
            isCheckedInToday={isCheckedInToday}
          />
        ) : view === "calendar" ? (
          <CalendarPageView
            goals={goals}
            onBack={() => setView("list")}
            onToggleDay={(goalId, dateStr) => handleToggleDay(goalId, dateStr)}
          />
        ) : view === "rewards" ? (
          <RewardsView
            goals={goals}
            onBack={() => setView("list")}
            onSelectGoal={(id) => {
              setSelectedGoalId(id);
              setView("detail");
            }}
            onClaim={(goalId, mId) => handleClaimReward(goalId, mId)}
          />
        ) : view === "create" ? (
          <CreateView
            onSave={handleCreateGoal}
            onCancel={() => setView("list")}
          />
        ) : view === "detail" && selectedGoal ? (
          <DetailView
            goal={selectedGoal}
            allGoals={goals}
            onBack={() => {
              setView("list");
              setSelectedGoalId(null);
            }}
            onCheckIn={() => handleCheckIn(selectedGoal.id)}
            onUndoCheckIn={() => handleUndoCheckIn(selectedGoal.id)}
            onToggleDay={(dateStr) => handleToggleDay(selectedGoal.id, dateStr)}
            onClaim={(mId) => handleClaimReward(selectedGoal.id, mId)}
            onAddMilestone={(m) => handleAddMilestone(selectedGoal.id, m)}
            onDeleteMilestone={(mId) => handleDeleteMilestone(selectedGoal.id, mId)}
            onUpdateThreshold={(t) => handleUpdateThreshold(selectedGoal.id, t)}
            onDelete={() => handleDeleteGoal(selectedGoal.id)}
            attemptStats={getAttemptStats(selectedGoal)}
            getProgress={getProgress}
            getStreak={getStreak}
            getNextMilestone={getNextMilestone}
            isCheckedInToday={isCheckedInToday}
            getSortedMilestones={getSortedMilestones}
          />
        ) : null}
      </div>

      {celebration && (
        <CelebrationModal
          goalName={celebration.goalName}
          reward={celebration.reward}
          onClaim={() => {
            if (celebration.goalId && celebration.milestoneId) {
              handleClaimReward(celebration.goalId, celebration.milestoneId);
            }
            setCelebration(null);
          }}
          onClose={() => setCelebration(null)}
        />
      )}
    </div>
  );
}

                            onClick={() => setPendingDeleteMilestoneId(m.id)}

                            style={{
                              color: palette.inkMuted,
                              background: "transparent",
                            }}
                            aria-label="Remove milestone"

                          </button>

                          <div className="flex items-center gap-1.5 text-xs">
                            <span style={{ color: palette.accent }}>remove?</span>

                              onClick={() => {
                                onDeleteMilestone(m.id);
                                setPendingDeleteMilestoneId(null);

                              className="px-2.5 py-1 rounded-full"
                              style={{
                                background: palette.accent,
                                color: palette.surface,
                              }}
                            >
                              yes
                            </button>

                              onClick={() => setPendingDeleteMilestoneId(null)}
                              className="px-2.5 py-1 rounded-full"
                              style={{
                                background: palette.surfaceDeep,
                                color: palette.inkSoft,
                              }}

        {addingMilestone ? (

                After

                  })

                className="col-span-3 px-3 py-2.5 rounded-xl outline-none ticker"
                style={{
                  background: palette.bg,
                  border: `1px solid ${palette.borderSoft}`,
                  color: palette.ink,

              />
              <select
                value={newMilestone.unit}
                onChange={(e) =>
                  setNewMilestone({ ...newMilestone, unit: e.target.value })
                }
                className="col-span-3 px-3 py-2.5 rounded-xl outline-none"
                style={{
                  background: palette.bg,
                  border: `1px solid ${palette.borderSoft}`,
                  color: palette.ink,
                }}
              >
                <option value="days">days</option>
                <option value="weeks">weeks</option>
                <option value="months">months</option>
              </select>
              <span
                className="col-span-4 text-sm text-center display-italic"
                style={{ color: palette.inkMuted }}
              >
                = {Math.round(newMilestone.amount * unitToDays[newMilestone.unit])} day
                {Math.round(newMilestone.amount * unitToDays[newMilestone.unit]) !== 1 ? "s" : ""}
              </span>
            </div>
            <input
              value={newMilestone.reward}
              onChange={(e) =>
                setNewMilestone({ ...newMilestone, reward: e.target.value })
              }
              placeholder="Reward — e.g. ice cream, dinner out, a hotel night"
              className="w-full px-4 py-2.5 rounded-xl outline-none mb-3"
              style={{
                background: palette.bg,
                border: `1px solid ${palette.borderSoft}`,
                color: palette.ink,
              }}
            />
            <div className="flex gap-2 justify-end">
              <button
                onClick={() => {
                  setAddingMilestone(false);
                  setNewMilestone({ amount: 1, unit: "weeks", reward: "" });

                style={{
                  background: palette.surfaceDeep,
                  color: palette.inkSoft,
                }}

                cancel
              </button>
              <button
                onClick={() => {
                  if (
                    !newMilestone.reward.trim() ||
                    newMilestone.amount < 1
                  )
                    return;
                  const day = Math.round(
                    newMilestone.amount * unitToDays[newMilestone.unit]
                  );
                  onAddMilestone({
                    id: `m_${Date.now()}_${Math.random()}`,

                    reward: newMilestone.reward.trim(),
                    claimed: false,

            style={{

              border: `1px dashed ${palette.border}`,
              color: palette.inkSoft,

          >

            style={{ color: palette.inkSoft }}

    </div>
  );
}

function CalendarView({ goal, allGoals, onToggleDay }) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayY = today.getFullYear();
  const todayM = today.getMonth();
  const todayD = today.getDate();
  const todayStr = (() => {
    const m = String(todayM + 1).padStart(2, "0");
    const d = String(todayD).padStart(2, "0");
    return `${todayY}-${m}-${d}`;
  })();

  const [viewDate, setViewDate] = useState({
    year: todayY,
    month: todayM,
  });

  const checkInsSet = new Set(goal.checkIns || []);

  const habitColor = getHabitColor(goal.id, allGoals || [goal]);
  const msEvents = getMilestoneEvents([goal], todayStr);
  const msByDate = indexEventsByDate(msEvents);

  const dateToStr = (year, month, day) => {
    const m = String(month + 1).padStart(2, "0");
    const d = String(day).padStart(2, "0");
    return `${year}-${m}-${d}`;
  };

  const monthLabel = new Date(viewDate.year, viewDate.month, 1).toLocaleString(
    "en-US",
    { month: "long", year: "numeric" }
  );

  const firstDayOfWeek = new Date(viewDate.year, viewDate.month, 1).getDay();
  const daysInMonth = new Date(
    viewDate.year,
    viewDate.month + 1,
    0
  ).getDate();

  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthPrefix = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}`;
  const monthCount = (goal.checkIns || []).filter((s) =>
    s.startsWith(monthPrefix)
  ).length;

  const goPrev = () => {
    const m = viewDate.month - 1;
    if (m < 0) setViewDate({ year: viewDate.year - 1, month: 11 });
    else setViewDate({ year: viewDate.year, month: m });
  };

  const goNext = () => {
    const m = viewDate.month + 1;
    if (m > 11) setViewDate({ year: viewDate.year + 1, month: 0 });
    else setViewDate({ year: viewDate.year, month: m });
  };

  const isFuture = (day) => {
    const cellDate = new Date(viewDate.year, viewDate.month, day);
    cellDate.setHours(0, 0, 0, 0);
    return cellDate > today;
  };

  const isBeforeStart = (day) => {
    const cellStr = dateToStr(viewDate.year, viewDate.month, day);
    return cellStr < (goal.createdAt || cellStr);
  };

  const isToday = (day) =>
    viewDate.year === todayY &&
    viewDate.month === todayM &&
    day === todayD;

  const dayLabels = ["S", "M", "T", "W", "T", "F", "S"];

  return (
    <section className="mb-10">
      <div className="flex items-end justify-between mb-1">
        <h2 className="display text-2xl flex items-center gap-2">
          <CalendarDays size={18} style={{ color: palette.accent }} /> Calendar
        </h2>
        <div
          className="text-sm display-italic"
          style={{ color: palette.inkSoft }}
        >
          <span className="ticker font-medium" style={{ color: palette.ink }}>
            {monthCount}
          </span>{" "}
          day{monthCount !== 1 ? "s" : ""} this month
        </div>
      </div>
      <p
        className="display-italic text-sm mb-5"
        style={{ color: palette.inkMuted }}
      >
        Tap any day to log it. The pattern is the proof.
      </p>

      <div
        className="rounded-3xl p-5 md:p-6"
        style={{
          background: palette.surface,
          border: `1px solid ${palette.border}`,
        }}
      >
        <div className="flex items-center justify-between mb-5">
          <button
            onClick={goPrev}
            className="w-9 h-9 rounded-full flex items-center justify-center transition-colors"
            style={{
              background: palette.surfaceDeep,
              color: palette.inkSoft,
            }}
            aria-label="Previous month"
          >
            <ChevronLeft size={18} />
          </button>
          <div className="display text-xl">{monthLabel}</div>
          <button
            onClick={goNext}
            className="w-9 h-9 rounded-full flex items-center justify-center transition-colors"
            style={{
              background: palette.surfaceDeep,
              color: palette.inkSoft,
            }}
            aria-label="Next month"
          >
            <ChevronRight size={18} />
          </button>
        </div>

        <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
          {dayLabels.map((d, i) => (
            <div
              key={i}
              className="text-center text-[10px] uppercase tracking-widest py-1"
              style={{
                color: palette.inkMuted,
                letterSpacing: "0.2em",
              }}
            >
              {d}
            </div>
          ))}
        </div>

        <div className="grid grid-cols-7 gap-1 md:gap-2">
          {cells.map((day, idx) => {
            if (day === null) {
              return <div key={idx} className="aspect-square" />;
            }
            const dStr = dateToStr(viewDate.year, viewDate.month, day);
            const completed = checkInsSet.has(dStr);
            const future = isFuture(day);
            const beforeStart = isBeforeStart(day);
            const locked = future || beforeStart;
            const today_ = isToday(day);
            const cellEvents = msByDate[dStr] || [];
            const earnedHere = cellEvents.find((e) => e.type === "earned");
            const projectedHere = cellEvents.find((e) => e.type === "projected");

            let bg = "transparent";
            let color = palette.ink;
            let border = `1px solid ${palette.borderSoft}`;

            if (completed) {
              bg = palette.forest;
              color = palette.surface;
              border = `1px solid ${palette.forest}`;
            } else if (locked) {
              bg = "transparent";
              color = palette.inkMuted;
              border = `1px dashed ${palette.borderSoft}`;
            } else {
              bg = palette.bg;
            }

            // Projected milestone styling overrides locked-future appearance
            if (projectedHere && !completed) {
              border = `1.5px dashed ${habitColor}`;
              bg = `${habitColor}14`; // ~8% alpha
              color = palette.ink;
            }
            // Earned overlay
            if (earnedHere) {
              border = `2px solid ${habitColor}`;
            }

            if (today_ && !completed && !projectedHere && !earnedHere) {
              border = `2px solid ${palette.accent}`;
            }

            return (
              <button
                key={idx}
                onClick={() => !locked && onToggleDay(dStr)}
                disabled={locked}
                className="aspect-square rounded-xl relative flex flex-col items-center justify-center transition-all"
                style={{
                  background: bg,
                  color,
                  border,
                  cursor: locked ? "not-allowed" : "pointer",
                  opacity: locked && !projectedHere ? 0.4 : 1,
                }}
                title={
                  earnedHere
                    ? `Earned: ${earnedHere.milestone.reward}`
                    : projectedHere
                    ? `Projected: ${projectedHere.milestone.reward}`
                    : undefined
                }
              >
                <span
                  className="ticker text-sm md:text-base"
                  style={{ fontWeight: today_ ? 600 : 400 }}
                >
                  {day}
                </span>
                {completed && !earnedHere && (
                  <Check
                    size={10}
                    strokeWidth={3}
                    style={{ marginTop: 1, opacity: 0.85 }}
                  />
                )}
                {earnedHere && (
                  <span
                    style={{
                      position: "absolute",
                      top: -5,
                      right: -5,
                      width: 16,
                      height: 16,
                      borderRadius: "50%",
                      background: habitColor,
                      color: palette.surface,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      border: `2px solid ${palette.surface}`,
                    }}
                  >
                    <Gift size={8} strokeWidth={2.5} />
                  </span>
                )}
                {projectedHere && !earnedHere && (
                  <span
                    style={{
                      position: "absolute",
                      bottom: 2,
                      left: 2,
                      right: 2,
                      fontSize: 8,
                      lineHeight: 1,
                      color: habitColor,
                      fontWeight: 500,
                      textAlign: "center",
                      overflow: "hidden",
                      textOverflow: "ellipsis",
                      whiteSpace: "nowrap",
                    }}
                  >
                    {projectedHere.milestone.reward}
                  </span>
                )}
              </button>
            );
          })}
        </div>

        <div
          className="flex flex-wrap items-center gap-x-5 gap-y-2 mt-5 pt-4 text-xs"
          style={{
            color: palette.inkMuted,
            borderTop: `1px solid ${palette.borderSoft}`,
          }}
        >
          <span className="flex items-center gap-1.5">
            <span
              className="w-3 h-3 rounded"
              style={{ background: palette.forest }}
            />
            done
          </span>
          <span className="flex items-center gap-1.5">
            <span
              className="w-3 h-3 rounded"
              style={{
                background: palette.bg,
                border: `2px solid ${palette.accent}`,
              }}
            />
            today
          </span>
          <span className="flex items-center gap-1.5">
            <span
              className="w-3 h-3 rounded"
              style={{
                background: palette.bg,
                border: `1px solid ${palette.borderSoft}`,
              }}
            />
            past
          </span>
          <span className="flex items-center gap-1.5">
            <span
              className="w-3 h-3 rounded"
              style={{
                background: "transparent",
                border: `1px dashed ${palette.borderSoft}`,
              }}
            />
            future
          </span>
        </div>
      </div>
    </section>
  );
}

function RewardsHabitCard({ goal, color, today, onSelect, onClaim }) {
  const progress = computeEffectiveProgress(goal);
  const sortedMs = [...(goal.milestones || [])].sort((a, b) => a.day - b.day);
  const earnedCount = sortedMs.filter((m) => m.claimed).length;
  const totalCount = sortedMs.length;

  // Compute projected dates for unclaimed milestones
  const projectedDateFor = (m) => {
    if (m.claimed || progress >= m.day) return null;
    const daysAway = m.day - progress;
    return { daysAway, date: addDays(today, daysAway) };
  };

  return (
    <div
      className="rounded-3xl overflow-hidden"
      style={{
        background: palette.surface,
        border: `1px solid ${palette.border}`,
        boxShadow: "0 1px 0 rgba(0,0,0,0.02), 0 12px 28px -18px rgba(31,26,20,0.18)",
      }}
    >
      {/* Color bar at top */}
      <div style={{ height: 4, background: color }} />

      <button
        onClick={onSelect}
        className="w-full text-left px-6 pt-5 pb-4 flex items-center justify-between gap-3 transition-colors"
        style={{ background: "transparent" }}
      >
        <div className="flex items-center gap-3 min-w-0">
          <div
            className="w-3 h-3 rounded-full shrink-0"
            style={{ background: color }}
          />
          <div className="min-w-0">
            <h3 className="display text-2xl truncate">{goal.name}</h3>
            {goal.description && (
              <div
                className="text-sm display-italic truncate"
                style={{ color: palette.inkMuted }}
              >
                {goal.description}
              </div>
            )}
          </div>
        </div>
        <div className="text-right shrink-0">
          <div
            className="text-[10px] uppercase tracking-widest"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Earned
          </div>
          <div className="display text-2xl ticker" style={{ color }}>
            {earnedCount}<span style={{ color: palette.inkMuted }}>/{totalCount}</span>
          </div>
        </div>
      </button>

      {sortedMs.length === 0 ? (
        <div
          className="px-6 pb-5 text-sm display-italic"
          style={{ color: palette.inkMuted }}
        >
          No milestones set yet.
        </div>
      ) : (
        <div
          className="px-6 pb-5 space-y-2"
          style={{ borderTop: `1px solid ${palette.borderSoft}`, paddingTop: 14 }}
        >
          {sortedMs.map((m) => {
            const claimed = m.claimed;
            const reached = !claimed && progress >= m.day;
            const proj = projectedDateFor(m);

            let statusEl;
            if (claimed) {
              statusEl = (
                <span
                  className="text-xs flex items-center gap-1"
                  style={{ color }}
                >
                  <Check size={12} strokeWidth={3} /> claimed {m.claimedAt}
                </span>
              );
            } else if (reached) {
              statusEl = (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onClaim(m.id);
                  }}
                  className="text-xs px-3 py-1 rounded-full font-medium transition-transform hover:scale-105"
                  style={{ background: color, color: palette.surface }}
                >
                  Claim now
                </button>
              );
            } else if (proj) {
              statusEl = (
                <span
                  className="text-xs ticker"
                  style={{ color: palette.inkMuted }}
                >
                  in {proj.daysAway} day{proj.daysAway !== 1 ? "s" : ""}
                  <span className="display-italic ml-1.5" style={{ color: palette.inkSoft }}>
                    · {proj.date}
                  </span>
                </span>
              );
            }

            return (
              <div
                key={m.id}
                className="flex items-center justify-between gap-3 py-1.5"
              >
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div
                    className="w-7 h-7 rounded-full flex items-center justify-center shrink-0"
                    style={{
                      background: claimed ? color : "transparent",
                      border: claimed ? "none" : `1.5px ${reached ? "solid" : "dashed"} ${color}`,
                      color: claimed ? palette.surface : color,
                    }}
                  >
                    {claimed ? (
                      <Check size={13} strokeWidth={3} />
                    ) : reached ? (
                      <Gift size={12} />
                    ) : (
                      <Lock size={11} />
                    )}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div
                      className="text-[10px] uppercase tracking-widest"
                      style={{ color: palette.inkMuted, letterSpacing: "0.18em" }}
                    >
                      Day {m.day}
                    </div>
                    <div
                      className="text-base truncate"
                      style={{
                        color: claimed ? palette.inkMuted : palette.ink,
                        textDecoration: claimed ? "line-through" : "none",
                      }}
                    >
                      {m.reward}
                    </div>
                  </div>
                </div>
                <div className="shrink-0">{statusEl}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function CalendarPageView({ goals, onBack, onToggleDay }) {

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const [cursor, setCursor] = useState(today);

    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  };

  const todayStr = dateToStr(today);
  const msEvents = getMilestoneEvents(goals, todayStr);
  const msByDate = indexEventsByDate(msEvents);

  const startOfWeek = (date) => {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - d.getDay());
    return d;
  };

  const navigatePrev = () => {
    const d = new Date(cursor);
    if (mode === "month") d.setMonth(d.getMonth() - 1);
    else if (mode === "week") d.setDate(d.getDate() - 7);
    else d.setDate(d.getDate() - 1);
    setCursor(d);
  };

  const navigateNext = () => {
    const d = new Date(cursor);
    if (mode === "month") d.setMonth(d.getMonth() + 1);
    else if (mode === "week") d.setDate(d.getDate() + 7);
    else d.setDate(d.getDate() + 1);
    setCursor(d);
  };

  const goToToday = () => setCursor(new Date(today));

  const headerLabel = () => {
    if (mode === "month") {
      return cursor.toLocaleString("en-US", {
        month: "long",
        year: "numeric",
      });
    }
    if (mode === "week") {
      const start = startOfWeek(cursor);
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const sameMonth = start.getMonth() === end.getMonth();
      const sameYear = start.getFullYear() === end.getFullYear();
      const startStr = start.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
      });
      const endStr = sameMonth
        ? end.toLocaleString("en-US", { day: "numeric" })
        : end.toLocaleString("en-US", { month: "short", day: "numeric" });
      const yearStr = sameYear ? end.getFullYear() : `${start.getFullYear()}–${end.getFullYear()}`;
      return `${startStr} – ${endStr}, ${yearStr}`;
    }
    return cursor.toLocaleString("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric",
      year: "numeric",
    });
  };

  const isCursorToday = dateToStr(cursor) === dateToStr(today);

  return (
    <div className="fade-in">
      <button
        onClick={onBack}
        className="flex items-center gap-1 text-sm mb-8 hover:gap-2 transition-all"
        style={{ color: palette.inkSoft }}
      >
        <ChevronLeft size={16} /> all habits
      </button>

      <header className="mb-8">
        <div
          className="text-xs uppercase tracking-widest mb-3"
          style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
        >
          What's on the page today
        </div>
        <h1 className="display text-5xl md:text-6xl leading-tight">
          your <span className="display-italic" style={{ color: palette.accent }}>calendar</span>
        </h1>
      </header>

      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
        <div
          className="inline-flex p-1 rounded-full self-start"
          style={{
            background: palette.surfaceDeep,
            border: `1px solid ${palette.borderSoft}`,
          }}
        >
          {["month", "week", "day"].map((m) => (
            <button
              key={m}
              onClick={() => setMode(m)}
              className="px-4 py-1.5 rounded-full text-sm capitalize transition-all"
              style={{
                background: mode === m ? palette.ink : "transparent",
                color: mode === m ? palette.bg : palette.inkSoft,
                fontWeight: mode === m ? 600 : 500,
              }}
            >
              {m}
            </button>
          ))}
        </div>
        {!isCursorToday && (
          <button
            onClick={goToToday}
            className="px-4 py-1.5 rounded-full text-sm self-start sm:self-center"
            style={{
              background: palette.surface,
              color: palette.accent,
              border: `1px solid ${palette.border}`,
            }}
          >
            Jump to today
          </button>
        )}
      </div>

      <div
        className="rounded-3xl p-5 md:p-7"
        style={{
          background: palette.surface,
          border: `1px solid ${palette.border}`,
        }}
      >
        <div className="flex items-center justify-between mb-6">
          <button
            onClick={navigatePrev}
            className="w-10 h-10 rounded-full flex items-center justify-center transition-colors"
            style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
            aria-label="Previous"
          >
            <ChevronLeft size={18} />
          </button>
          <div className="display text-xl md:text-2xl text-center px-2">
            {headerLabel()}
          </div>
          <button
            onClick={navigateNext}
            className="w-10 h-10 rounded-full flex items-center justify-center transition-colors"
            style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
            aria-label="Next"
          >
            <ChevronRight size={18} />
          </button>
        </div>

        {goals.length === 0 ? (
          <div
            className="text-center py-10 display-italic"
            style={{ color: palette.inkMuted }}
          >
            No habits yet. Create one and they'll appear here.
          </div>
        ) : mode === "day" ? (
          <DayMode
            cursor={cursor}
            today={today}
            goals={goals}
            msByDate={msByDate}
            dateToStr={dateToStr}
            onToggleDay={onToggleDay}
          />
        ) : mode === "week" ? (
          <WeekMode
            cursor={cursor}
            today={today}
            goals={goals}
            msByDate={msByDate}
            dateToStr={dateToStr}
            startOfWeek={startOfWeek}
            onToggleDay={onToggleDay}
            onJumpToDay={(d) => {
              setCursor(d);
              setMode("day");
            }}
          />
        ) : (
          <MonthMode
            cursor={cursor}
            today={today}
            goals={goals}
            msByDate={msByDate}
            dateToStr={dateToStr}
            onJumpToDay={(d) => {
              setCursor(d);
              setMode("day");
            }}
          />
        )}
      </div>
    </div>
  );
}

function DayMode({ cursor, today, goals, msByDate, dateToStr, onToggleDay }) {
  const dStr = dateToStr(cursor);
  const isFuture = cursor > today;
  const activeGoals = goals.filter((g) => (g.createdAt || dStr) <= dStr);
  const completed = activeGoals.filter((g) => (g.checkIns || []).includes(dStr));
  const total = activeGoals.length;
  const scheduledCount = goals.length - activeGoals.length;
  const dayEvents = msByDate[dStr] || [];

  return (
    <div>
      <div
        className="text-center mb-6 pb-5"
        style={{ borderBottom: `1px solid ${palette.borderSoft}` }}
      >
        <div
          className="text-xs uppercase tracking-widest mb-1"
          style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
        >
          {isFuture ? "Coming up" : "On this day"}
        </div>
        <div className="display text-3xl md:text-4xl">
          <span className="ticker">{completed.length}</span>
          <span style={{ color: palette.inkMuted }}> of </span>
          <span className="ticker">{total}</span>
          <span className="display-italic" style={{ color: palette.inkSoft }}>
            {" "}
            done
          </span>
        </div>
        {dayEvents.length > 0 && (
          <div className="mt-3 flex flex-wrap items-center justify-center gap-2">
            {dayEvents.map((e, i) => {
              const c = getHabitColor(e.habit.id, goals);
              return (
                <span
                  key={i}
                  className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs"
                  style={{
                    background: e.type === "earned" ? c : "transparent",
                    color: e.type === "earned" ? palette.surface : c,
                    border: e.type === "earned" ? "none" : `1.5px dashed ${c}`,
                    fontWeight: 500,
                  }}
                  title={`${e.habit.name}: ${e.milestone.reward}`}
                >
                  <Gift size={11} />
                  {e.milestone.reward}
                </span>
              );
            })}
          </div>
        )}
      </div>

      <div className="space-y-3">
        {activeGoals.map((g) => {
          const done = (g.checkIns || []).includes(dStr);
          return (
            <button
              key={g.id}
              onClick={() => !isFuture && onToggleDay(g.id, dStr)}
              disabled={isFuture}
              className="w-full text-left rounded-2xl p-4 md:p-5 flex items-center gap-4 transition-all"
              style={{
                background: done ? palette.surfaceDeep : palette.bg,
                border: `1px solid ${done ? palette.forest : palette.borderSoft}`,
                opacity: isFuture ? 0.55 : 1,
                cursor: isFuture ? "not-allowed" : "pointer",
              }}
            >
              <div
                className="w-10 h-10 rounded-full flex items-center justify-center shrink-0"
                style={{
                  background: done ? palette.forest : "transparent",
                  border: done ? "none" : `2px solid ${palette.border}`,
                  color: done ? palette.surface : palette.inkMuted,
                }}
              >
                {done ? <Check size={18} strokeWidth={3} /> : <Circle size={18} strokeWidth={1.5} />}
              </div>
              <div className="flex-1 min-w-0">
                <div
                  className="display text-xl truncate"
                  style={{
                    textDecoration: done ? "line-through" : "none",
                    textDecorationColor: palette.inkMuted,
                  }}
                >
                  {g.name}
                </div>
                {g.description && (
                  <div
                    className="text-sm display-italic truncate"
                    style={{ color: palette.inkMuted }}
                  >
                    {g.description}
                  </div>
                )}
              </div>
            </button>
          );
        })}
        {activeGoals.length === 0 && (
          <div
            className="text-center py-6 display-italic"
            style={{ color: palette.inkMuted }}
          >
            No habits had started yet on this day.
          </div>
        )}
        {scheduledCount > 0 && (
          <div
            className="text-center pt-2 text-xs display-italic"
            style={{ color: palette.inkMuted }}
          >
            {scheduledCount} habit{scheduledCount !== 1 ? "s" : ""} scheduled to start later — not shown here.
          </div>
        )}
      </div>
    </div>
  );
}

function WeekMode({ cursor, today, goals, msByDate, dateToStr, startOfWeek, onToggleDay, onJumpToDay }) {
  const start = startOfWeek(cursor);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  return (
    <div className="space-y-3">
      {days.map((d, i) => {
        const dStr = dateToStr(d);
        const isFuture = d > today;
        const isToday = dStr === dateToStr(today);
        const activeGoals = goals.filter((g) => (g.createdAt || dStr) <= dStr);
        const completed = activeGoals.filter((g) =>
          (g.checkIns || []).includes(dStr)
        );
        const dayLabel = d.toLocaleString("en-US", { weekday: "long" });
        const dateLabel = d.toLocaleString("en-US", {
          month: "short",
          day: "numeric",
        });
        const dayEvents = msByDate[dStr] || [];
        const eventByHabit = {};
        for (const e of dayEvents) eventByHabit[e.habit.id] = e;

        return (
          <div
            key={i}
            className="rounded-2xl overflow-hidden"
            style={{
              background: palette.bg,
              border: `1px solid ${
                isToday ? palette.accent : palette.borderSoft
              }`,
              opacity: isFuture ? 0.6 : 1,
            }}
          >
            <button
              onClick={() => onJumpToDay(d)}
              className="w-full px-4 py-3 flex items-center justify-between gap-3"
              style={{
                background: isToday ? palette.surface : palette.surfaceDeep,
                borderBottom: `1px solid ${palette.borderSoft}`,
              }}
            >
              <div className="flex items-baseline gap-3 min-w-0">
                <span className="display text-base">{dayLabel}</span>
                <span
                  className="text-sm display-italic truncate"
                  style={{ color: palette.inkMuted }}
                >
                  {dateLabel}
                </span>
                {isToday && (
                  <span
                    className="text-[10px] uppercase tracking-widest px-2 py-0.5 rounded-full shrink-0"
                    style={{
                      background: palette.accent,
                      color: palette.surface,
                      letterSpacing: "0.18em",
                    }}
                  >
                    today
                  </span>
                )}
              </div>
              <span className="ticker text-sm shrink-0" style={{ color: palette.inkSoft }}>
                {completed.length}/{activeGoals.length}
              </span>
            </button>
            <div className="p-3 space-y-1.5">
              {activeGoals.length === 0 ? (
                <div
                  className="text-xs display-italic px-2 py-1"
                  style={{ color: palette.inkMuted }}
                >
                  No habits had started yet.
                </div>
              ) : (
                activeGoals.map((g) => {
                const done = (g.checkIns || []).includes(dStr);
                const ev = eventByHabit[g.id];
                const habitC = ev ? getHabitColor(g.id, goals) : null;
                return (
                  <button
                    key={g.id}
                    onClick={(e) => {
                      e.stopPropagation();
                      if (!isFuture) onToggleDay(g.id, dStr);
                    }}
                    disabled={isFuture}
                    className="w-full text-left rounded-xl px-3 py-2 flex items-center gap-3 transition-all"
                    style={{
                      background: done ? palette.surfaceDeep : "transparent",
                      cursor: isFuture ? "not-allowed" : "pointer",
                    }}
                  >
                    <div
                      className="w-6 h-6 rounded-md flex items-center justify-center shrink-0"
                      style={{
                        background: done ? palette.forest : "transparent",
                        border: done ? "none" : `1.5px solid ${palette.border}`,
                        color: done ? palette.surface : "transparent",
                      }}
                    >
                      {done && <Check size={12} strokeWidth={3} />}
                    </div>
                    <span
                      className="text-sm truncate flex-1"
                      style={{
                        color: done ? palette.inkSoft : palette.ink,
                        textDecoration: done ? "line-through" : "none",
                        textDecorationColor: palette.inkMuted,
                      }}
                    >
                      {g.name}
                    </span>
                    {ev && (
                      <span
                        className="text-[10px] px-2 py-0.5 rounded-full inline-flex items-center gap-1 shrink-0"
                        style={{
                          background: ev.type === "earned" ? habitC : "transparent",
                          color: ev.type === "earned" ? palette.surface : habitC,
                          border: ev.type === "earned" ? "none" : `1px dashed ${habitC}`,
                          fontWeight: 500,
                        }}
                        title={ev.milestone.reward}
                      >
                        <Gift size={9} />
                        <span className="truncate max-w-[70px]">{ev.milestone.reward}</span>
                      </span>
                    )}
                  </button>
                );
                })
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function MonthMode({ cursor, today, goals, msByDate, dateToStr, onJumpToDay }) {
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDayOfWeek = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const dayLabels = ["S", "M", "T", "W", "T", "F", "S"];
  const todayStr = dateToStr(today);

  return (
    <div>
      <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
        {dayLabels.map((d, i) => (
          <div
            key={i}
            className="text-center text-[10px] uppercase tracking-widest py-1"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            {d}
          </div>
        ))}
      </div>

      <div className="grid grid-cols-7 gap-1 md:gap-2">
        {cells.map((day, idx) => {
          if (day === null) return <div key={idx} className="aspect-square" />;
          const date = new Date(year, month, day);
          date.setHours(0, 0, 0, 0);
          const dStr = dateToStr(date);
          const isFuture = date > today;
          const isToday = dStr === todayStr;
          const activeGoals = goals.filter((g) => (g.createdAt || dStr) <= dStr);
          const completed = activeGoals.filter((g) =>
            (g.checkIns || []).includes(dStr)
          ).length;
          const total = activeGoals.length;
          const ratio = total > 0 ? completed / total : 0;
          const allDone = total > 0 && completed === total;

          let bg = palette.bg;
          let dotColor = palette.amber;
          if (isFuture) {
            bg = "transparent";
          } else if (allDone) {
            bg = palette.forest;
          } else if (ratio > 0) {
            bg = palette.surfaceDeep;
          }

          return (
            <button
              key={idx}
              onClick={() => !isFuture && onJumpToDay(date)}
              disabled={isFuture}
              className="aspect-square rounded-xl p-1.5 md:p-2 flex flex-col items-start justify-between transition-all"
              style={{
                background: bg,
                border: isToday
                  ? `2px solid ${palette.accent}`
                  : isFuture
                  ? `1px dashed ${palette.borderSoft}`
                  : `1px solid ${palette.borderSoft}`,
                color: allDone ? palette.surface : palette.ink,
                cursor: isFuture ? "not-allowed" : "pointer",
                opacity: isFuture ? 0.5 : 1,
              }}
            >
              <span
                className="ticker text-xs md:text-sm"
                style={{ fontWeight: isToday ? 600 : 400 }}
              >
                {day}
              </span>
              {(() => {
                const evs = msByDate[dStr] || [];
                if (evs.length === 0) return null;
                return (
                  <div
                    className="flex flex-wrap gap-[2px] self-end justify-end"
                    style={{ marginTop: "auto" }}
                  >
                    {evs.slice(0, 4).map((e, i) => {
                      const c = getHabitColor(e.habit.id, goals);
                      return (
                        <span
                          key={i}
                          style={{
                            display: "inline-block",
                            width: 6,
                            height: 6,
                            borderRadius: "50%",
                            background: e.type === "earned" ? c : "transparent",
                            border: e.type === "earned" ? "none" : `1.5px solid ${c}`,
                          }}
                          title={`${e.habit.name}: ${e.milestone.reward}`}
                        />
                      );
                    })}
                  </div>
                );
              })()}
              {!isFuture && total > 0 && (
                <div className="flex items-center gap-0.5 self-end">
                  {completed > 0 && completed < total && (
                    <span
                      className="text-[9px] md:text-[10px] ticker"
                      style={{ color: palette.inkMuted }}
                    >
                      {completed}/{total}
                    </span>
                  )}
                  {allDone && (
                    <Check size={11} strokeWidth={3} style={{ color: palette.surface }} />
                  )}
                </div>
              )}
            </button>
          );
        })}
      </div>

      <div
        className="flex flex-wrap items-center gap-x-5 gap-y-2 mt-5 pt-4 text-xs"
        style={{
          color: palette.inkMuted,
          borderTop: `1px solid ${palette.borderSoft}`,
        }}
      >
        <span className="flex items-center gap-1.5">
          <span
            className="w-3 h-3 rounded"
            style={{ background: palette.forest }}
          />
          all done
        </span>
        <span className="flex items-center gap-1.5">
          <span
            className="w-3 h-3 rounded"
            style={{ background: palette.surfaceDeep }}
          />
          some done
        </span>
        <span className="flex items-center gap-1.5">
          <span
            className="w-3 h-3 rounded"
            style={{
              background: palette.bg,
              border: `2px solid ${palette.accent}`,
            }}
          />
          today
        </span>
        <span style={{ color: palette.inkMuted }} className="display-italic">
          tap a day to open it
        </span>
      </div>
    </div>
  );
}

function AttemptPanel({ goal, attemptStats, onUpdateThreshold }) {
  const { elapsedDays, completedDays, missedDays, missRate, attemptStart } = attemptStats;
  const threshold = goal.missRateThreshold ?? RESET_MISS_RATE;

  const today = (() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  })();

  const minDays = 5;
  const fillRatio = Math.min(1, missRate / threshold);
  const warningZone = threshold * 0.66;
  const isWarning = missRate > warningZone && missRate <= threshold;
  const isDanger = missRate > threshold;
  const tooEarly = elapsedDays < minDays;

  const barColor = isDanger
    ? palette.accent
    : isWarning
    ? palette.amber
    : palette.forest;

  const recentReset = (goal.attemptResets || [])
    .filter((r) => r.date === today)
    .slice(-1)[0];

  const pct = Math.round(missRate * 100);
  const thresholdPct = Math.round(threshold * 100);

  const [editingThreshold, setEditingThreshold] = useState(false);
  const [draftThreshold, setDraftThreshold] = useState(threshold);

  const startEdit = () => {
    setDraftThreshold(threshold);
    setEditingThreshold(true);
  };
  const commitEdit = () => {
    onUpdateThreshold(draftThreshold);
    setEditingThreshold(false);
  };
  const cancelEdit = () => setEditingThreshold(false);

  return (
    <div
      className="rounded-2xl p-5 mb-8"
      style={{
        background: palette.surface,
        border: `1px solid ${isDanger ? palette.accent : palette.border}`,
      }}
    >
      {recentReset && (
        <div
          className="rounded-xl px-4 py-3 mb-4 flex items-start gap-2 text-sm"
          style={{
            background: palette.surfaceDeep,
            color: palette.ink,
            border: `1px solid ${palette.amber}`,
          }}
        >
          <RotateCcw size={16} style={{ color: palette.accent, marginTop: 2 }} />
          <div>
            <div style={{ fontWeight: 600 }}>Progress reset today.</div>
            <div className="text-xs mt-0.5 display-italic" style={{ color: palette.inkSoft }}>
              {recentReset.completedDays} of {recentReset.elapsedDays} days completed in your last attempt ({Math.round(recentReset.missRate * 100)}% missed). Calendar history is intact — fresh start now.
            </div>
          </div>
        </div>
      )}

      <AttemptPanelStateContent
        goal={goal}
        attemptStats={attemptStats}
        today={today}
        threshold={threshold}
        thresholdPct={thresholdPct}
        barColor={barColor}
        fillRatio={fillRatio}
        isWarning={isWarning}
        isDanger={isDanger}
        tooEarly={tooEarly}
        minDays={minDays}
        pct={pct}
      />

      {editingThreshold ? (
        <div
          className="rounded-xl mt-4 p-4"
          style={{
            background: palette.bg,
            border: `1px solid ${palette.borderSoft}`,
          }}
        >
          <div
            className="text-[10px] uppercase tracking-widest mb-3"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Set reset threshold for this habit
          </div>
          <ThresholdSlider
            value={draftThreshold}
            onChange={setDraftThreshold}
          />
          <div className="flex gap-2 justify-end mt-4">
            <button
              onClick={cancelEdit}
              className="px-4 py-1.5 rounded-full text-sm"
              style={{
                background: palette.surfaceDeep,
                color: palette.inkSoft,
              }}
            >
              cancel
            </button>
            <button
              onClick={commitEdit}
              className="px-4 py-1.5 rounded-full text-sm font-medium"
              style={{
                background: palette.ink,
                color: palette.bg,
              }}
            >
              save
            </button>
          </div>
        </div>
      ) : (
        <div
          className="flex items-center justify-between mt-3 pt-3 text-xs"
          style={{
            color: palette.inkMuted,
            borderTop: `1px solid ${palette.borderSoft}`,
          }}
        >
          <span className="display-italic">
            Resets at {thresholdPct}% miss rate · stricter habits use lower numbers
          </span>
          <button
            onClick={startEdit}
            className="flex items-center gap-1 hover:underline"
            style={{ color: palette.accent }}
          >
            <Settings2 size={12} /> adjust
          </button>
        </div>
      )}
    </div>
  );
}

  threshold,
  thresholdPct,
  barColor,
  fillRatio,
  isWarning,
  isDanger,
  tooEarly,
  minDays,
  pct,
}) {
  const { elapsedDays, completedDays, missedDays, attemptStart } = attemptStats;
  const isScheduled = goal.createdAt > today;
  const isNotStarted = !isScheduled && completedDays === 0;

  if (isScheduled) {
    const startDate = new Date(goal.createdAt + "T00:00:00");
    const todayDate = new Date(today + "T00:00:00");

          className="text-sm display-italic"

  return (

      <div className="flex items-end justify-between mb-3 gap-3">
        <div>
          <div
            className="text-[10px] uppercase tracking-widest mb-1"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Current attempt · since {attemptStart}
          </div>
          <div className="display text-lg leading-tight">
            <span className="ticker">{elapsedDays}</span> day
            {elapsedDays !== 1 ? "s" : ""} ·{" "}
            <span className="ticker" style={{ color: palette.forest }}>
              {completedDays}
            </span>{" "}
            done ·{" "}
            <span
              className="ticker"
              style={{
                color: missedDays > 0 ? palette.accent : palette.inkMuted,
              }}
            >
              {missedDays}
            </span>{" "}

        <div className="text-right shrink-0">
          <div

            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}

          <div className="display text-2xl ticker" style={{ color: barColor }}>
            {pct}%

      </div>

      <div
        className="h-2 rounded-full overflow-hidden mb-2 relative"
        style={{ background: palette.surfaceDeep }}
      >
        <div
