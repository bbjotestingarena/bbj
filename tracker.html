function CreateView({ onSave, onCancel }) {
  const todayDefault = (() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  })();
  const [name, setName] = useState("");
  const [description, setDescription] = useState("");
  const [startDate, setStartDate] = useState(todayDefault);
  const [missRateThreshold, setMissRateThreshold] = useState(0.30);
  const [milestones, setMilestones] = useState([
    { id: `m_${Date.now()}_1`, amount: 1, unit: "weeks", reward: "" },
  ]);

  const unitToDays = { days: 1, weeks: 7, months: 30 };

  const addMilestone = () => {
    setMilestones([
      ...milestones,
      {
        id: `m_${Date.now()}_${Math.random()}`,
        amount: milestones.length + 1,
        unit: "weeks",
        reward: "",
      },
    ]);
  };

  const updateMilestone = (id, patch) => {
    setMilestones(milestones.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  };

  const removeMilestone = (id) => {
    setMilestones(milestones.filter((m) => m.id !== id));
  };

  const canSave =
    name.trim().length > 0 &&
    milestones.every((m) => m.amount > 0 && m.reward.trim().length > 0);

  const handleSave = () => {
    if (!canSave) return;
    const finalMilestones = milestones
      .map((m) => ({
        id: m.id,
        day: Math.round(m.amount * unitToDays[m.unit]),
        reward: m.reward.trim(),
        claimed: false,
        claimedAt: null,
      }))
      .sort((a, b) => a.day - b.day);

    onSave({
      name: name.trim(),
      description: description.trim(),
      startDate,
      missRateThreshold,
      milestones: finalMilestones,
    });
  };

  return (
    <div className="fade-in">
      <button
        onClick={onCancel}
        className="flex items-center gap-1 text-sm mb-8 hover:gap-2 transition-all"
        style={{ color: palette.inkSoft }}
      >
        <ChevronLeft size={16} /> back
      </button>

      <h1
        className="display text-5xl md:text-6xl leading-tight mb-2"
      >
        a new <span className="display-italic" style={{ color: palette.accent }}>habit</span>
      </h1>
      <p
        className="display-italic text-lg mb-10"
        style={{ color: palette.inkMuted }}
      >
        Name what you'll show up for. Mark the path with rewards worth showing up for.
      </p>

      <div className="space-y-6 mb-10">
        <Field label="What's the habit?">
          <input
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Daily yoga"
            className="w-full px-5 py-4 rounded-2xl outline-none text-lg"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,
              color: palette.ink,
            }}
          />
        </Field>

        <Field label="A little more (optional)">
          <textarea
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            placeholder="30 minutes every morning before coffee"
            rows={2}
            className="w-full px-5 py-4 rounded-2xl outline-none resize-none"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,
              color: palette.ink,
            }}
          />
        </Field>

        <Field label="When are you starting?">
          <input
            type="date"
            value={startDate}
            onChange={(e) => setStartDate(e.target.value)}
            className="w-full px-5 py-4 rounded-2xl outline-none text-lg ticker"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,
              color: palette.ink,
              colorScheme: "light",
            }}
          />
          <div
            className="text-xs mt-2 display-italic"
            style={{ color: palette.inkMuted }}
          >
            {startDate === todayDefault
              ? "Today by default. Pick a past date to backdate, or a future date to schedule."
              : startDate < todayDefault
              ? `Backdated by ${Math.abs(Math.round((new Date(startDate + "T00:00:00") - new Date(todayDefault + "T00:00:00")) / 86400000))} days. You can mark past completions in the calendar after creating.`

        <div>

          >
            Reset threshold
          </div>

            }}

        <div>

            <div>
              <div
                className="text-xs uppercase tracking-widest mb-1"
                style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
              >
                Milestones & rewards
              </div>
              <div
                className="display-italic text-sm"
                style={{ color: palette.inkSoft }}
              >
                Mark the path with treats worth showing up for.
              </div>
            </div>
          </div>

          <div className="space-y-3">
            {milestones.map((m, i) => (
              <div
                key={m.id}
                className="rounded-2xl p-4 md:p-5"
                style={{
                  background: palette.surface,
                  border: `1px solid ${palette.border}`,

                <div className="grid grid-cols-12 gap-2 md:gap-3 items-center">

                    style={{
                      background: palette.bg,
                      border: `1px solid ${palette.borderSoft}`,
                      color: palette.ink,
                    }}
                  />
                  <select
                    value={m.unit}
                    onChange={(e) =>
                      updateMilestone(m.id, { unit: e.target.value })
                    }
                    className="col-span-3 px-3 py-2.5 rounded-xl outline-none"
                    style={{
                      background: palette.bg,
                      border: `1px solid ${palette.borderSoft}`,
                      color: palette.ink,
                    }}
                  >
                    <option value="days">days</option>
                    <option value="weeks">weeks</option>
                    <option value="months">months</option>
                  </select>
                  <span
                    className="col-span-4 text-sm text-center display-italic"
                    style={{ color: palette.inkMuted }}
                  >
                    = {Math.round(m.amount * unitToDays[m.unit])} day{Math.round(m.amount * unitToDays[m.unit]) !== 1 ? "s" : ""}
                  </span>
                </div>
                <div className="mt-3">
                  <input
                    value={m.reward}
                    onChange={(e) =>
                      updateMilestone(m.id, { reward: e.target.value })
                    }
                    placeholder="Reward — e.g. ice cream, dinner out, a hotel night"
                    className="w-full px-4 py-2.5 rounded-xl outline-none"
                    style={{
                      background: palette.bg,
                      border: `1px solid ${palette.borderSoft}`,
                      color: palette.ink,
                    }}
                  />
                </div>
              </div>
            ))}

            <button
              onClick={addMilestone}
              className="w-full rounded-2xl py-4 flex items-center justify-center gap-2 transition-colors"
              style={{
                background: "transparent",
                border: `1px dashed ${palette.border}`,
                color: palette.inkSoft,
              }}
            >
              <Plus size={16} /> Add another milestone
            </button>
          </div>
        </div>
      </div>

      <div className="flex gap-3">
        <button
          onClick={onCancel}
          className="px-6 py-3 rounded-full"
          style={{
            background: palette.surfaceDeep,
            color: palette.inkSoft,

          style={{

    </div>
  );
}

    /* ── Auth gate ─────────────────────────────────────────────────────── */
    const LOGIN_PATH = "index.html";

    function AuthGate() {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [migrating, setMigrating] = useState(false);
      const [migrationDone, setMigrationDone] = useState(false);

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data }) => {
          if (!data.session) {
            window.location.replace(LOGIN_PATH);
            return;
          }
          setSession(data.session);
          setAuthLoading(false);
        });
        const { data: sub } = supabaseClient.auth.onAuthStateChange((evt, s) => {
          if (evt === "SIGNED_OUT" || !s) {
            window.location.replace(LOGIN_PATH);
            return;
          }
          setSession(s);
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      // One-time migration of legacy localStorage data when first signing in
      useEffect(() => {
        if (!session || migrationDone) return;
        const legacy = localStorage.getItem("goals-data");
        const migratedFlag = localStorage.getItem(`goals-data-migrated:${session.user.id}`);
        if (!legacy || migratedFlag) { setMigrationDone(true); return; }
        (async () => {
          setMigrating(true);
          try {
            const blob = JSON.parse(legacy);
            const cloud = await fetchAllRows(session.user.id);
            const cloudEmpty = cloud.habits.length === 0;
            if (cloudEmpty && (blob.goals?.length || 0) > 0) {
              await replaceAllRows(session.user.id, blob);
            }
            localStorage.setItem(`goals-data-migrated:${session.user.id}`, "1");
            localStorage.setItem("goals-data-legacy-backup", legacy);
            localStorage.removeItem("goals-data");
          } catch (e) {
            console.error("Migration failed:", e);
            alert("Migration of local habits to cloud failed: " + (e.message || e));
          } finally {
            setMigrating(false);
            setMigrationDone(true);
          }
        })();
      }, [session, migrationDone]);

      if (authLoading || !session) {
        return (
          <div
            className="min-h-screen flex items-center justify-center"
            style={{ background: "#FBEDF1", color: "#9B7989",
                     fontFamily: "'Fraunces', Georgia, serif", fontStyle: "italic", fontSize: 24 }}
          >
            opening your journal…
          </div>
        );
      }

      if (migrating) {
        return (
          <div
            className="min-h-screen flex items-center justify-center px-6 text-center"
            style={{ background: "#FBEDF1", color: "#3D2638" }}
          >
            <div>
              <div style={{ fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600, fontSize: 32, marginBottom: 8 }}>
                Moving your habits to the cloud…
              </div>
              <div style={{ fontFamily: "'Fraunces', Georgia, serif", fontStyle: "italic", color: "#9B7989" }}>
                One moment. This only happens once.
              </div>
            </div>
          </div>
        );
      }

      return (
        <>
          <GoalTracker key={session.user.id} session={session} />
          <SignOutButton email={session.user.email} />
        </>
      );
    }

    function SignOutButton({ email }) {
      const [open, setOpen] = useState(false);
      const signOut = async () => {
        await supabaseClient.auth.signOut();
        // Belt-and-suspenders: onAuthStateChange should also redirect, but be explicit
        window.location.replace(LOGIN_PATH);
      };
      return (
        <div
          className="fixed top-3 right-3 z-40"
          style={{ fontFamily: "'Manrope', system-ui, sans-serif" }}
        >
          {open ? (
            <div
              className="rounded-2xl px-4 py-3 flex items-center gap-3 text-sm shadow-lg"

            >

                {email}
              </div>
              <button
                onClick={signOut}
                className="px-3 py-1 rounded-full text-xs"
                style={{ background: "#D85F87", color: "#FFF5F8" }}
              >
                Sign out
              </button>
              <button
                onClick={() => setOpen(false)}

                style={{ color: "#9B7989" }}

              >
                ✕
              </button>

          ) : (
            <button
              onClick={() => setOpen(true)}
              className="w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-md"
              style={{ background: "#FFF5F8", border: "1px solid #E8C9D5", color: "#664756" }}
              aria-label="Account"
              title="Account"
            >
              {email ? email[0].toUpperCase() : "·"}
            </button>
          )}
        </div>
      );
    }

    /* ── Mount ────────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AuthGate />);
  </script>
</body>
</html>
