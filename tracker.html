function RewardsHabitCard({ goal, color, today, onSelect, onClaim }) {
  const progress = computeEffectiveProgress(goal);
  const sortedMs = [...(goal.milestones || [])].sort((a, b) => a.day - b.day);
  const earnedCount = sortedMs.filter((m) => m.claimed).length;
  const totalCount = sortedMs.length;

  // Compute projected dates for unclaimed milestones
  const projectedDateFor = (m) => {
    if (m.claimed || progress >= m.day) return null;
    const daysAway = m.day - progress;
    return { daysAway, date: addDays(today, daysAway) };
  };

  return (
    <div
      className="rounded-3xl overflow-hidden"
      style={{
        background: palette.surface,
        border: `1px solid ${palette.border}`,
        boxShadow: "0 1px 0 rgba(0,0,0,0.02), 0 12px 28px -18px rgba(31,26,20,0.18)",
      }}
    >
      {/* Color bar at top */}
      <div style={{ height: 4, background: color }} />

      <button
        onClick={onSelect}
        className="w-full text-left px-6 pt-5 pb-4 flex items-center justify-between gap-3 transition-colors"
        style={{ background: "transparent" }}
      >
        <div className="flex items-center gap-3 min-w-0">
          <div
            className="w-3 h-3 rounded-full shrink-0"
            style={{ background: color }}
          />
          <div className="min-w-0">
            <h3 className="display text-2xl truncate">{goal.name}</h3>
            {goal.description && (
              <div
                className="text-sm display-italic truncate"
                style={{ color: palette.inkMuted }}
              >
                {goal.description}
              </div>
            )}
          </div>
        </div>
        <div className="text-right shrink-0">
          <div
            className="text-[10px] uppercase tracking-widest"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Earned
          </div>
          <div className="display text-2xl ticker" style={{ color }}>
            {earnedCount}<span style={{ color: palette.inkMuted }}>/{totalCount}</span>
          </div>
        </div>
      </button>

      {sortedMs.length === 0 ? (
        <div
          className="px-6 pb-5 text-sm display-italic"
          style={{ color: palette.inkMuted }}
        >
          No milestones set yet.
        </div>
      ) : (
        <div
          className="px-6 pb-5 space-y-2"
          style={{ borderTop: `1px solid ${palette.borderSoft}`, paddingTop: 14 }}
        >
          {sortedMs.map((m) => {
            const claimed = m.claimed;
            const reached = !claimed && progress >= m.day;
            const proj = projectedDateFor(m);

            let statusEl;
            if (claimed) {
              statusEl = (
                <span
                  className="text-xs flex items-center gap-1"
                  style={{ color }}
                >
                  <Check size={12} strokeWidth={3} /> claimed {m.claimedAt}
                </span>
              );
            } else if (reached) {
              statusEl = (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onClaim(m.id);
                  }}
                  className="text-xs px-3 py-1 rounded-full font-medium transition-transform hover:scale-105"
                  style={{ background: color, color: palette.surface }}
                >
                  Claim now
                </button>
              );
            } else if (proj) {
              statusEl = (
                <span
                  className="text-xs ticker"
                  style={{ color: palette.inkMuted }}
                >
                  in {proj.daysAway} day{proj.daysAway !== 1 ? "s" : ""}
                  <span className="display-italic ml-1.5" style={{ color: palette.inkSoft }}>
                    · {proj.date}
                  </span>
                </span>
              );
            }

            return (
              <div
                key={m.id}
                className="flex items-center justify-between gap-3 py-1.5"
              >
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div
                    className="w-7 h-7 rounded-full flex items-center justify-center shrink-0"
                    style={{
                      background: claimed ? color : "transparent",
                      border: claimed ? "none" : `1.5px ${reached ? "solid" : "dashed"} ${color}`,
                      color: claimed ? palette.surface : color,
                    }}
                  >
                    {claimed ? (
                      <Check size={13} strokeWidth={3} />
                    ) : reached ? (
                      <Gift size={12} />
                    ) : (
                      <Lock size={11} />
                    )}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div
                      className="text-[10px] uppercase tracking-widest"
                      style={{ color: palette.inkMuted, letterSpacing: "0.18em" }}
                    >
                      Day {m.day}
                    </div>
                    <div
                      className="text-base truncate"
                      style={{
                        color: claimed ? palette.inkMuted : palette.ink,
                        textDecoration: claimed ? "line-through" : "none",
                      }}
                    >
                      {m.reward}
                    </div>
                  </div>
                </div>
                <div className="shrink-0">{statusEl}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function CalendarPageView({ goals, onBack, onToggleDay }) {
  const [mode, setMode] = useState("day");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const [cursor, setCursor] = useState(today);

  const dateToStr = (date) => {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  };

  const todayStr = dateToStr(today);
  const msEvents = getMilestoneEvents(goals, todayStr);
  const msByDate = indexEventsByDate(msEvents);

  const startOfWeek = (date) => {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - d.getDay());
    return d;
  };

  const navigatePrev = () => {
    const d = new Date(cursor);
    if (mode === "month") d.setMonth(d.getMonth() - 1);
    else if (mode === "week") d.setDate(d.getDate() - 7);
    else d.setDate(d.getDate() - 1);
    setCursor(d);
  };

  const navigateNext = () => {
    const d = new Date(cursor);
    if (mode === "month") d.setMonth(d.getMonth() + 1);
    else if (mode === "week") d.setDate(d.getDate() + 7);
    else d.setDate(d.getDate() + 1);
    setCursor(d);
  };

  const goToToday = () => setCursor(new Date(today));

  const headerLabel = () => {
    if (mode === "month") {
      return cursor.toLocaleString("en-US", {
        month: "long",
        year: "numeric",
      });
    }
    if (mode === "week") {
      const start = startOfWeek(cursor);
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const sameMonth = start.getMonth() === end.getMonth();
      const sameYear = start.getFullYear() === end.getFullYear();
      const startStr = start.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
      });
      const endStr = sameMonth
        ? end.toLocaleString("en-US", { day: "numeric" })
        : end.toLocaleString("en-US", { month: "short", day: "numeric" });
      const yearStr = sameYear ? end.getFullYear() : `${start.getFullYear()}–${end.getFullYear()}`;
      return `${startStr} – ${endStr}, ${yearStr}`;
    }
    return cursor.toLocaleString("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric",
      year: "numeric",
    });
  };

  const isCursorToday = dateToStr(cursor) === dateToStr(today);

  return (
    <div className="fade-in">
      <button
        onClick={onBack}
        className="flex items-center gap-1 text-sm mb-8 hover:gap-2 transition-all"
        style={{ color: palette.inkSoft }}
      >
        <ChevronLeft size={16} /> all habits
      </button>

      <header className="mb-8">
        <div
          className="text-xs uppercase tracking-widest mb-3"
          style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
        >
          What's on the page today
        </div>
        <h1 className="display text-3xl sm:text-4xl md:text-6xl leading-tight">
          your <span className="display-italic" style={{ color: palette.accent }}>calendar</span>
        </h1>
      </header>

      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
        <div
          className="inline-flex p-1 rounded-full self-start"
          style={{
            background: palette.surfaceDeep,
            border: `1px solid ${palette.borderSoft}`,
          }}
        >
          {["month", "week", "day"].map((m) => (
            <button
              key={m}
              onClick={() => setMode(m)}
              className="px-4 py-1.5 rounded-full text-sm capitalize transition-all"
              style={{
                background: mode === m ? palette.ink : "transparent",
                color: mode === m ? palette.bg : palette.inkSoft,
                fontWeight: mode === m ? 600 : 500,
              }}
            >
              {m}
            </button>
          ))}
        </div>
        {!isCursorToday && (
          <button
            onClick={goToToday}
            className="px-4 py-1.5 rounded-full text-sm self-start sm:self-center"
            style={{
              background: palette.surface,
              color: palette.accent,
              border: `1px solid ${palette.border}`,
            }}
          >
            Jump to today
          </button>
        )}
      </div>

      <div
        className="rounded-3xl p-5 md:p-7"
        style={{
          background: palette.surface,
          border: `1px solid ${palette.border}`,
        }}
      >
        <div className="flex items-center justify-between mb-6">
          <button
            onClick={navigatePrev}
            className="w-10 h-10 rounded-full flex items-center justify-center transition-colors"
            style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
            aria-label="Previous"
          >
            <ChevronLeft size={18} />
          </button>
          <div className="display text-xl md:text-2xl text-center px-2">
            {headerLabel()}
          </div>
          <button
            onClick={navigateNext}
            className="w-10 h-10 rounded-full flex items-center justify-center transition-colors"
            style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
            aria-label="Next"
          >
            <ChevronRight size={18} />
          </button>
        </div>

        {goals.length === 0 ? (
          <div
            className="text-center py-10 display-italic"
            style={{ color: palette.inkMuted }}
          >
            No habits yet. Create one and they'll appear here.
          </div>
        ) : mode === "day" ? (
          <DayMode
            cursor={cursor}
            today={today}
            goals={goals}
            msByDate={msByDate}
            dateToStr={dateToStr}
            onToggleDay={onToggleDay}
          />
        ) : mode === "week" ? (
          <WeekMode
            cursor={cursor}
            today={today}
            goals={goals}
            msByDate={msByDate}
            dateToStr={dateToStr}
            startOfWeek={startOfWeek}
            onToggleDay={onToggleDay}
            onJumpToDay={(d) => {
              setCursor(d);
              setMode("day");
            }}
          />
        ) : (
          <MonthMode
            cursor={cursor}
            today={today}
            goals={goals}
            msByDate={msByDate}
            dateToStr={dateToStr}
            onJumpToDay={(d) => {
              setCursor(d);
              setMode("day");
            }}
          />
        )}
      </div>
    </div>
  );
}

  const completed = activeGoals.filter((g) => (g.checkIns || []).includes(dStr));

  const scheduledCount = goals.length - activeGoals.length;
  const dayEvents = msByDate[dStr] || [];

    <div>
      <div
        className="text-center mb-6 pb-5"
        style={{ borderBottom: `1px solid ${palette.borderSoft}` }}
      >

          style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}

        <div className="display text-3xl md:text-4xl">
          <span className="ticker">{completed.length}</span>
          <span style={{ color: palette.inkMuted }}> of </span>

          <span className="display-italic" style={{ color: palette.inkSoft }}>

        {dayEvents.length > 0 && (

              return (

                  style={{
                    background: e.type === "earned" ? c : "transparent",
                    color: e.type === "earned" ? palette.surface : c,
                    border: e.type === "earned" ? "none" : `1.5px dashed ${c}`,
                    fontWeight: 500,
                  }}
                  title={`${e.habit.name}: ${e.milestone.reward}`}

              </div>
              <div className="flex-1 min-w-0">
                <div
                  className="display text-xl truncate"
                  style={{
                    textDecoration: done ? "line-through" : "none",
                    textDecorationColor: palette.inkMuted,
                  }}
                >
                  {g.name}

                {g.description && (
                  <div
                    className="text-sm display-italic truncate"
                    style={{ color: palette.inkMuted }}
                  >
                    {g.description}
                  </div>
                )}
              </div>
            </button>
          );
        })}

          <div
            className="text-center py-6 display-italic"
            style={{ color: palette.inkMuted }}
          >

          </div>
        )}

          <div
            className="text-center pt-2 text-xs display-italic"

          >

          </div>

function WeekMode({ cursor, today, goals, msByDate, dateToStr, startOfWeek, onToggleDay, onJumpToDay }) {
  const start = startOfWeek(cursor);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  return (
    <div className="space-y-3">
      {days.map((d, i) => {
        const dStr = dateToStr(d);
        const isFuture = d > today;
        const isToday = dStr === dateToStr(today);
        const activeGoals = goals.filter((g) => (g.createdAt || dStr) <= dStr);
        const completed = activeGoals.filter((g) =>
          (g.checkIns || []).includes(dStr)
        );
        const dayLabel = d.toLocaleString("en-US", { weekday: "long" });
        const dateLabel = d.toLocaleString("en-US", {
          month: "short",
          day: "numeric",
        });
        const dayEvents = msByDate[dStr] || [];
        const eventByHabit = {};
        for (const e of dayEvents) eventByHabit[e.habit.id] = e;

        return (
          <div
            key={i}
            className="rounded-2xl overflow-hidden"
            style={{
              background: palette.bg,
              border: `1px solid ${
                isToday ? palette.accent : palette.borderSoft
              }`,
              opacity: isFuture ? 0.6 : 1,
            }}
          >
            <button
              onClick={() => onJumpToDay(d)}
              className="w-full px-4 py-3 flex items-center justify-between gap-3"
              style={{
                background: isToday ? palette.surface : palette.surfaceDeep,
                borderBottom: `1px solid ${palette.borderSoft}`,
              }}
            >
              <div className="flex items-baseline gap-3 min-w-0">
                <span className="display text-base">{dayLabel}</span>
                <span
                  className="text-sm display-italic truncate"
                  style={{ color: palette.inkMuted }}
                >
                  {dateLabel}
                </span>
                {isToday && (
                  <span
                    className="text-[10px] uppercase tracking-widest px-2 py-0.5 rounded-full shrink-0"
                    style={{
                      background: palette.accent,
                      color: palette.surface,
                      letterSpacing: "0.18em",
                    }}
                  >
                    today
                  </span>
                )}
              </div>
              <span className="ticker text-sm shrink-0" style={{ color: palette.inkSoft }}>
                {completed.length}/{activeGoals.length}
              </span>
            </button>
            <div className="p-3 space-y-1.5">
              {activeGoals.length === 0 ? (
                <div
                  className="text-xs display-italic px-2 py-1"
                  style={{ color: palette.inkMuted }}
                >
                  No habits had started yet.
                </div>
              ) : (
                activeGoals.map((g) => {
                const done = (g.checkIns || []).includes(dStr);
                const ev = eventByHabit[g.id];
                const habitC = ev ? getHabitColor(g.id, goals) : null;
                return (
                  <button
                    key={g.id}
                    onClick={(e) => {
                      e.stopPropagation();
                      if (!isFuture) onToggleDay(g.id, dStr);
                    }}
                    disabled={isFuture}
                    className="w-full text-left rounded-xl px-3 py-2 flex items-center gap-3 transition-all"
                    style={{
                      background: done ? palette.surfaceDeep : "transparent",
                      cursor: isFuture ? "not-allowed" : "pointer",
                    }}
                  >
                    <div
                      className="w-6 h-6 rounded-md flex items-center justify-center shrink-0"
                      style={{
                        background: done ? palette.forest : "transparent",
                        border: done ? "none" : `1.5px solid ${palette.border}`,
                        color: done ? palette.surface : "transparent",
                      }}
                    >
                      {done && <Check size={12} strokeWidth={3} />}
                    </div>
                    <span
                      className="text-sm truncate flex-1"
                      style={{
                        color: done ? palette.inkSoft : palette.ink,
                        textDecoration: done ? "line-through" : "none",
                        textDecorationColor: palette.inkMuted,
                      }}
                    >
                      {g.name}
                    </span>
                    {ev && (
                      <span
                        className="text-[10px] px-2 py-0.5 rounded-full inline-flex items-center gap-1 shrink-0"
                        style={{
                          background: ev.type === "earned" ? habitC : "transparent",
                          color: ev.type === "earned" ? palette.surface : habitC,
                          border: ev.type === "earned" ? "none" : `1px dashed ${habitC}`,
                          fontWeight: 500,
                        }}
                        title={ev.milestone.reward}
                      >
                        <Gift size={9} />
                        <span className="truncate max-w-[70px]">{ev.milestone.reward}</span>
                      </span>
                    )}
                  </button>
                );
                })
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function MonthMode({ cursor, today, goals, msByDate, dateToStr, onJumpToDay }) {
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDayOfWeek = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const dayLabels = ["S", "M", "T", "W", "T", "F", "S"];
  const todayStr = dateToStr(today);

  return (
    <div>
      <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
        {dayLabels.map((d, i) => (
          <div
            key={i}
            className="text-center text-[10px] uppercase tracking-widest py-1"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            {d}
          </div>
        ))}
      </div>

      <div className="grid grid-cols-7 gap-1 md:gap-2">
        {cells.map((day, idx) => {
          if (day === null) return <div key={idx} className="aspect-square" />;
          const date = new Date(year, month, day);
          date.setHours(0, 0, 0, 0);
          const dStr = dateToStr(date);
          const isFuture = date > today;
          const isToday = dStr === todayStr;
          const activeGoals = goals.filter((g) => (g.createdAt || dStr) <= dStr);
          const completed = activeGoals.filter((g) =>
            (g.checkIns || []).includes(dStr)
          ).length;
          const total = activeGoals.length;
          const ratio = total > 0 ? completed / total : 0;
          const allDone = total > 0 && completed === total;

          let bg = palette.bg;
          let dotColor = palette.amber;
          if (isFuture) {
            bg = "transparent";
          } else if (allDone) {
            bg = palette.forest;
          } else if (ratio > 0) {
            bg = palette.surfaceDeep;
          }

          return (
            <button
              key={idx}
              onClick={() => !isFuture && onJumpToDay(date)}
              disabled={isFuture}
              className="aspect-square rounded-xl p-1.5 md:p-2 flex flex-col items-start justify-between transition-all"
              style={{
                background: bg,
                border: isToday
                  ? `2px solid ${palette.accent}`
                  : isFuture
                  ? `1px dashed ${palette.borderSoft}`
                  : `1px solid ${palette.borderSoft}`,
                color: allDone ? palette.surface : palette.ink,
                cursor: isFuture ? "not-allowed" : "pointer",
                opacity: isFuture ? 0.5 : 1,
              }}
            >
              <span
                className="ticker text-xs md:text-sm"
                style={{ fontWeight: isToday ? 600 : 400 }}
              >
                {day}
              </span>
              {(() => {
                const evs = msByDate[dStr] || [];
                if (evs.length === 0) return null;
                return (
                  <div
                    className="flex flex-wrap gap-[2px] self-end justify-end"
                    style={{ marginTop: "auto" }}
                  >
                    {evs.slice(0, 4).map((e, i) => {
                      const c = getHabitColor(e.habit.id, goals);
                      return (
                        <span
                          key={i}
                          style={{
                            display: "inline-block",
                            width: 6,
                            height: 6,
                            borderRadius: "50%",
                            background: e.type === "earned" ? c : "transparent",
                            border: e.type === "earned" ? "none" : `1.5px solid ${c}`,
                          }}
                          title={`${e.habit.name}: ${e.milestone.reward}`}
                        />
                      );
                    })}
                  </div>
                );
              })()}
              {!isFuture && total > 0 && (
                <div className="flex items-center gap-0.5 self-end">
                  {completed > 0 && completed < total && (
                    <span
                      className="text-[9px] md:text-[10px] ticker"
                      style={{ color: palette.inkMuted }}
                    >
                      {completed}/{total}
                    </span>
                  )}
                  {allDone && (
                    <Check size={11} strokeWidth={3} style={{ color: palette.surface }} />
                  )}
                </div>
              )}
            </button>
          );
        })}
      </div>

      <div
        className="flex flex-wrap items-center gap-x-5 gap-y-2 mt-5 pt-4 text-xs"
        style={{
          color: palette.inkMuted,
          borderTop: `1px solid ${palette.borderSoft}`,
        }}
      >
        <span className="flex items-center gap-1.5">
          <span
            className="w-3 h-3 rounded"
            style={{ background: palette.forest }}
          />
          all done
        </span>
        <span className="flex items-center gap-1.5">
          <span
            className="w-3 h-3 rounded"
            style={{ background: palette.surfaceDeep }}
          />
          some done
        </span>
        <span className="flex items-center gap-1.5">
          <span
            className="w-3 h-3 rounded"
            style={{
              background: palette.bg,
              border: `2px solid ${palette.accent}`,
            }}
          />
          today
        </span>
        <span style={{ color: palette.inkMuted }} className="display-italic">
          tap a day to open it
        </span>
      </div>
    </div>
  );
}

function AttemptPanel({ goal, attemptStats, onUpdateThreshold }) {
  const { elapsedDays, completedDays, missedDays, missRate, attemptStart } = attemptStats;
  const threshold = goal.missRateThreshold ?? RESET_MISS_RATE;

  const today = (() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  })();

  const minDays = 5;
  const fillRatio = Math.min(1, missRate / threshold);
  const warningZone = threshold * 0.66;
  const isWarning = missRate > warningZone && missRate <= threshold;
  const isDanger = missRate > threshold;
  const tooEarly = elapsedDays < minDays;

  const barColor = isDanger
    ? palette.accent
    : isWarning
    ? palette.amber
    : palette.forest;

  const recentReset = (goal.attemptResets || [])
    .filter((r) => r.date === today)
    .slice(-1)[0];

  const pct = Math.round(missRate * 100);
  const thresholdPct = Math.round(threshold * 100);

  const [editingThreshold, setEditingThreshold] = useState(false);
  const [draftThreshold, setDraftThreshold] = useState(threshold);

  const startEdit = () => {
    setDraftThreshold(threshold);
    setEditingThreshold(true);
  };
  const commitEdit = () => {
    onUpdateThreshold(draftThreshold);
    setEditingThreshold(false);
  };
  const cancelEdit = () => setEditingThreshold(false);

  return (
    <div
      className="rounded-2xl p-5 mb-8"
      style={{
        background: palette.surface,
        border: `1px solid ${isDanger ? palette.accent : palette.border}`,
      }}
    >
      {recentReset && (
        <div
          className="rounded-xl px-4 py-3 mb-4 flex items-start gap-2 text-sm"
          style={{
            background: palette.surfaceDeep,
            color: palette.ink,
            border: `1px solid ${palette.amber}`,
          }}
        >
          <RotateCcw size={16} style={{ color: palette.accent, marginTop: 2 }} />
          <div>
            <div style={{ fontWeight: 600 }}>Progress reset today.</div>
            <div className="text-xs mt-0.5 display-italic" style={{ color: palette.inkSoft }}>
              {recentReset.completedDays} of {recentReset.elapsedDays} days completed in your last attempt ({Math.round(recentReset.missRate * 100)}% missed). Calendar history is intact — fresh start now.
            </div>
          </div>
        </div>
      )}

      <AttemptPanelStateContent
        goal={goal}
        attemptStats={attemptStats}
        today={today}
        threshold={threshold}
        thresholdPct={thresholdPct}
        barColor={barColor}
        fillRatio={fillRatio}
        isWarning={isWarning}
        isDanger={isDanger}
        tooEarly={tooEarly}
        minDays={minDays}
        pct={pct}
      />

      {editingThreshold ? (
        <div
          className="rounded-xl mt-4 p-4"
          style={{
            background: palette.bg,
            border: `1px solid ${palette.borderSoft}`,
          }}
        >
          <div
            className="text-[10px] uppercase tracking-widest mb-3"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Set reset threshold for this habit
          </div>
          <ThresholdSlider
            value={draftThreshold}
            onChange={setDraftThreshold}
          />
          <div className="flex gap-2 justify-end mt-4">
            <button
              onClick={cancelEdit}
              className="px-4 py-1.5 rounded-full text-sm"
              style={{
                background: palette.surfaceDeep,
                color: palette.inkSoft,
              }}
            >
              cancel
            </button>
            <button
              onClick={commitEdit}
              className="px-4 py-1.5 rounded-full text-sm font-medium"
              style={{
                background: palette.ink,
                color: palette.bg,
              }}
            >
              save
            </button>
          </div>
        </div>
      ) : (
        <div
          className="flex items-center justify-between mt-3 pt-3 text-xs"
          style={{
            color: palette.inkMuted,
            borderTop: `1px solid ${palette.borderSoft}`,
          }}
        >
          <span className="display-italic">
            Resets at {thresholdPct}% miss rate · stricter habits use lower numbers
          </span>
          <button
            onClick={startEdit}
            className="flex items-center gap-1 hover:underline"
            style={{ color: palette.accent }}
          >
            <Settings2 size={12} /> adjust
          </button>
        </div>
      )}
    </div>
  );
}

function AttemptPanelStateContent({
  goal,
  attemptStats,
  today,
  threshold,
  thresholdPct,
  barColor,
  fillRatio,
  isWarning,
  isDanger,
  tooEarly,
  minDays,
  pct,
}) {
  const { elapsedDays, completedDays, missedDays, attemptStart } = attemptStats;
  const isScheduled = goal.createdAt > today;
  const isNotStarted = !isScheduled && completedDays === 0;

  if (isScheduled) {
    const startDate = new Date(goal.createdAt + "T00:00:00");
    const todayDate = new Date(today + "T00:00:00");
    const daysUntil = Math.max(
      0,
      Math.round((startDate - todayDate) / 86400000)
    );
    return (
      <div className="flex items-center gap-4 py-2">
        <div
          className="w-12 h-12 rounded-full flex items-center justify-center shrink-0"
          style={{ background: palette.amber, color: palette.ink }}
        >
          <CalendarDays size={22} />
        </div>
        <div className="min-w-0">
          <div
            className="text-[10px] uppercase tracking-widest mb-1"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Scheduled
          </div>
          <div className="display text-xl leading-tight">
            Starts in <span className="ticker">{daysUntil}</span> day
            {daysUntil !== 1 ? "s" : ""}
          </div>
          <div
            className="text-sm display-italic mt-0.5"
            style={{ color: palette.inkSoft }}
          >
            on {goal.createdAt}
          </div>
        </div>
      </div>
    );
  }

  if (isNotStarted) {
    return (
      <div className="text-center py-4">
        <div className="display text-xl mb-1">Ready when you are.</div>
        <div
          className="text-sm display-italic"
          style={{ color: palette.inkSoft }}
        >
          Make your first check-in to start the clock — until then no resets, no warnings.
        </div>
      </div>
    );
  }

  return (
    <>
      <div className="flex items-end justify-between mb-3 gap-3">
        <div>
          <div
            className="text-[10px] uppercase tracking-widest mb-1"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Current attempt · since {attemptStart}
          </div>
          <div className="display text-lg leading-tight">
            <span className="ticker">{elapsedDays}</span> day
            {elapsedDays !== 1 ? "s" : ""} ·{" "}
            <span className="ticker" style={{ color: palette.forest }}>
              {completedDays}
            </span>{" "}
            done ·{" "}
            <span
              className="ticker"
              style={{
                color: missedDays > 0 ? palette.accent : palette.inkMuted,
              }}
            >
              {missedDays}
            </span>{" "}
            missed
          </div>
        </div>
        <div className="text-right shrink-0">
          <div
            className="text-[10px] uppercase tracking-widest"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Miss rate
          </div>
          <div className="display text-2xl ticker" style={{ color: barColor }}>
            {pct}%
          </div>
        </div>
      </div>

      <div
        className="h-2 rounded-full overflow-hidden mb-2 relative"
        style={{ background: palette.surfaceDeep }}
      >
        <div
          className="h-full rounded-full transition-all duration-500"
          style={{
            width: `${fillRatio * 100}%`,
            background: barColor,
          }}
        />
      </div>
      <div
        className="flex items-center justify-between text-xs"
        style={{ color: palette.inkMuted }}
      >
        <span>0%</span>
        <span className="display-italic text-center px-2 truncate">
          {tooEarly
            ? `Reset rule activates after day ${minDays}`
            : isDanger
            ? "Over the limit — next save will reset your progress"
            : isWarning
            ? "Getting close to the reset line"
            : "Plenty of room. Keep showing up."}
        </span>
        <span style={{ color: palette.accent, fontWeight: 600 }}>
          {thresholdPct}%
        </span>
      </div>
    </>
  );
}

function CreateView({ onSave, onCancel }) {
  const todayDefault = (() => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  })();
  const [name, setName] = useState("");
  const [description, setDescription] = useState("");
  const [startDate, setStartDate] = useState(todayDefault);
  const [endDate, setEndDate] = useState(""); // optional; for quantitative habits only
  const [missRateThreshold, setMissRateThreshold] = useState(0.30);
  const [habitType, setHabitType] = useState("daily");
  const [unit, setUnit] = useState("");
  const [includeMilestones, setIncludeMilestones] = useState(false);
  const [milestones, setMilestones] = useState([
    { id: `m_${Date.now()}_1`, amount: 1, unit: "weeks", reward: "" },
  ]);

  const unitToDays = { days: 1, weeks: 7, months: 30 };

  const addMilestone = () => {
    setMilestones([
      ...milestones,
      {
        id: `m_${Date.now()}_${Math.random()}`,
        amount: milestones.length + 1,
        unit: habitType === "quantitative" ? (unit || "items") : "weeks",
        reward: "",
      },
    ]);
  };

  const updateMilestone = (id, patch) => {
    setMilestones(milestones.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  };

  const removeMilestone = (id) => {
    setMilestones(milestones.filter((m) => m.id !== id));
  };

  const canSave =
    name.trim().length > 0 &&
    (habitType !== "quantitative" || unit.trim().length > 0) &&
    (!endDate || endDate >= startDate) &&
    (!includeMilestones || milestones.every((m) => m.amount > 0));

  const handleSave = () => {
    if (!canSave) return;
    const finalMilestones = !includeMilestones ? [] : milestones
      .map((m) => ({
        id: m.id,
        day: habitType === "quantitative"
          ? Math.round(m.amount)
          : Math.round(m.amount * unitToDays[m.unit]),
        reward: m.reward.trim(),
        claimed: false,
        claimedAt: null,
      }))
      .sort((a, b) => a.day - b.day);

    onSave({
      name: name.trim(),
      description: description.trim(),
      startDate,
      endDate: habitType === "quantitative" && endDate ? endDate : null,
      missRateThreshold,
      habitType,
      unit: habitType === "quantitative" ? unit.trim() : null,
      milestones: finalMilestones,
    });
  };

  return (
    <div className="fade-in">
      <button
        onClick={onCancel}
        className="flex items-center gap-1 text-sm mb-8 hover:gap-2 transition-all"
        style={{ color: palette.inkSoft }}
      >
        <ChevronLeft size={16} /> back
      </button>

      <h1
        className="display text-3xl sm:text-4xl md:text-6xl leading-tight mb-2"
      >
        a new <span className="display-italic" style={{ color: palette.accent }}>habit</span>
      </h1>
      <p
        className="display-italic text-lg mb-10"
        style={{ color: palette.inkMuted }}
      >
        Name what you'll show up for. Mark the path with rewards worth showing up for.

      <div className="space-y-6 mb-10">
        <Field label="What's the habit?">
          <input
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Daily yoga"
            className="w-full px-5 py-4 rounded-2xl outline-none text-lg"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,

          />
        </Field>

        <Field label="A little more (optional)">
          <textarea

/* EditView mirrors CreateView but pre-populates from an existing goal and
   submits a partial patch via onSave. Habit type and start date are not
   editable post-create — changing those would invalidate existing
   check-ins and progress math. End date, name, description, threshold,
   unit, and milestones are all editable.                                */
function EditView({ goal, onSave, onCancel }) {
  const [name, setName] = useState(goal.name || "");
  const [description, setDescription] = useState(goal.description || "");
  const [endDate, setEndDate] = useState(goal.endDate || "");
  const [missRateThreshold, setMissRateThreshold] = useState(goal.missRateThreshold ?? 0.30);
  const [unit, setUnit] = useState(goal.unit || "");
  const isQuant = goal.habitType === "quantitative";

  // Convert existing milestones (which store .day) back into editable form
  const dayToFormUnit = (day, isQuantitative) => {
    if (isQuantitative) return { amount: day, unit: "items" };
    if (day % 30 === 0 && day >= 30) return { amount: day / 30, unit: "months" };
    if (day % 7 === 0 && day >= 7) return { amount: day / 7, unit: "weeks" };
    return { amount: day, unit: "days" };
  };
  const initialIncludeMs = (goal.milestones || []).length > 0;
  const [includeMilestones, setIncludeMilestones] = useState(initialIncludeMs);
  const [milestones, setMilestones] = useState(
    (goal.milestones || []).length === 0
      ? [{ id: `m_${Date.now()}_1`, amount: 1, unit: "weeks", reward: "" }]
      : goal.milestones.map((m) => {
          const { amount, unit: u } = dayToFormUnit(m.day, isQuant);
          return { id: m.id, amount, unit: u, reward: m.reward || "" };
        })
  );

  const unitToDays = { days: 1, weeks: 7, months: 30 };

  const addMilestone = () => {
    setMilestones([
      ...milestones,
      {
        id: `m_${Date.now()}_${Math.random()}`,
        amount: milestones.length + 1,
        unit: isQuant ? (unit || "items") : "weeks",
        reward: "",
      },
    ]);
  };

  const updateMilestone = (id, patch) => {
    setMilestones(milestones.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  };

  const removeMilestone = (id) => {
    setMilestones(milestones.filter((m) => m.id !== id));
  };

  const startDate = goal.attemptStart || goal.createdAt;
  const canSave =
    name.trim().length > 0 &&
    (!isQuant || unit.trim().length > 0) &&
    (!endDate || endDate >= startDate) &&
    (!includeMilestones || milestones.every((m) => m.amount > 0));

  const handleSave = () => {
    if (!canSave) return;
    const finalMilestones = !includeMilestones ? [] : milestones
      .map((m) => ({
        id: m.id,
        day: isQuant
          ? Math.round(m.amount)
          : Math.round(m.amount * unitToDays[m.unit]),
        reward: m.reward.trim(),
      }))
      .sort((a, b) => a.day - b.day);

    onSave({
      name: name.trim(),
      description: description.trim(),
      endDate: isQuant && endDate ? endDate : null,
      missRateThreshold,
      unit: isQuant ? unit.trim() : null,
      milestones: finalMilestones,
    });
  };

  return (
    <div className="fade-in">
      <button
        onClick={onCancel}
        className="flex items-center gap-1 text-sm mb-5 md:mb-8 hover:gap-2 transition-all"
        style={{ color: palette.inkSoft }}
      >
        <ChevronLeft size={16} /> back to habit
      </button>

      <h1
        className="display text-3xl sm:text-4xl md:text-6xl leading-tight mb-2"
      >
        edit <span className="display-italic" style={{ color: palette.accent }}>habit</span>
      </h1>
      <p
        className="display-italic text-base md:text-xl mb-8"
        style={{ color: palette.inkSoft }}
      >
        Habit type and start date are locked once you've started — they affect existing progress.
      </p>

      <div className="space-y-6">
        <Field label="What's the habit?">
          <input
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Daily yoga, learn 20 words…"
            className="w-full px-5 py-4 rounded-2xl outline-none text-lg"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,
              color: palette.ink,
            }}
          />
        </Field>

        <Field label="A little more (optional)">
          <textarea
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            placeholder="30 minutes every morning before coffee"
            rows={2}
            className="w-full px-5 py-4 rounded-2xl outline-none resize-none"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,
              color: palette.ink,
            }}
          />
        </Field>

        {/* Habit type indicator (read-only) */}
        <div>
          <div
            className="text-xs uppercase tracking-widest mb-2"
            style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
          >
            Habit type · locked
          </div>
          <div
            className="rounded-2xl px-5 py-3 text-sm"
            style={{
              background: palette.surfaceDeep,
              color: palette.inkSoft,
            }}
          >
            {isQuant ? "Count toward a target" : "Daily check-in"}
          </div>
        </div>

        {isQuant && (
          <Field label="What are you counting?">
            <input
              value={unit}
              onChange={(e) => setUnit(e.target.value)}
              placeholder="words, km, pages, minutes…"
              className="w-full px-5 py-4 rounded-2xl outline-none"
              style={{
                background: palette.surface,
                border: `1px solid ${palette.border}`,
                color: palette.ink,
              }}
            />
          </Field>
        )}

        {isQuant && (
          <Field label="Deadline (optional)">
            <input
              type="date"
              value={endDate}
              min={startDate}
              onChange={(e) => setEndDate(e.target.value)}
              className="w-full px-5 py-4 rounded-2xl outline-none text-lg ticker"
              style={{
                background: palette.surface,
                border: `1px solid ${palette.border}`,
                color: palette.ink,
              }}
            />
            {endDate && (
              <button
                type="button"
                onClick={() => setEndDate("")}
                className="text-xs mt-2 underline"
                style={{ color: palette.inkSoft }}
              >
                clear deadline
              </button>
            )}
          </Field>
        )}

        {/* Threshold slider */}
        <div>
          <div className="flex items-end justify-between mb-2">
            <div
              className="text-xs uppercase tracking-widest"
              style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
            >
              Reset rule
            </div>
            <div className="text-sm ticker" style={{ color: palette.inkSoft }}>
              {Math.round(missRateThreshold * 100)}% miss rate
            </div>
          </div>
          <input
            type="range"
            min="0.10"
            max="0.50"
            step="0.05"
            value={missRateThreshold}
            onChange={(e) => setMissRateThreshold(parseFloat(e.target.value))}
            className="w-full"
          />
          <div
            className="text-xs mt-2 display-italic"
            style={{ color: palette.inkMuted }}
          >
            Current attempt resets if you miss more than this fraction of days (after day 5).
          </div>
        </div>

        {/* Milestones */}
        <div>
          <div className="flex items-start justify-between gap-3 mb-3">
            <div>
              <div
                className="text-xs uppercase tracking-widest mb-1"
                style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
              >
                Milestones & rewards
              </div>
              <div
                className="display-italic text-sm"
                style={{ color: palette.inkSoft }}
              >
                Editing these keeps your existing claimed rewards. Reward field is optional.
              </div>
            </div>
            <button
              type="button"
              onClick={() => setIncludeMilestones(!includeMilestones)}
              className="px-4 py-2 rounded-full text-sm whitespace-nowrap shrink-0"
              style={{
                background: includeMilestones ? palette.surfaceDeep : palette.ink,
                color: includeMilestones ? palette.inkSoft : palette.bg,
                fontWeight: 500,
              }}
            >
              {includeMilestones ? "Skip" : "Add milestones"}
            </button>
          </div>

          {includeMilestones && (
          <div className="space-y-3">
            {milestones.map((m, i) => (
              <div
                key={m.id}
                className="rounded-2xl p-4 md:p-5"
                style={{
                  background: palette.surface,
                  border: `1px solid ${palette.border}`,
                }}
              >
                <div className="flex items-center justify-between mb-3">
                  <div
                    className="text-xs uppercase tracking-widest"
                    style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
                  >
                    Milestone {i + 1}
                  </div>
                  {milestones.length > 1 && (
                    <button
                      type="button"
                      onClick={() => removeMilestone(m.id)}
                      className="text-xs"
                      style={{ color: palette.inkMuted }}
                    >
                      remove
                    </button>
                  )}
                </div>
                <div className="grid grid-cols-12 gap-2 md:gap-3 items-center">
                  <span
                    className="col-span-2 text-sm text-right"
                    style={{ color: palette.inkSoft }}
                  >
                    After
                  </span>
                  <input
                    type="number"
                    min="1"
                    value={m.amount}
                    onChange={(e) =>
                      updateMilestone(m.id, {
                        amount: parseInt(e.target.value) || 0,
                      })
                    }
                    className="col-span-3 px-3 py-2.5 rounded-xl outline-none ticker"
                    style={{
                      background: palette.bg,
                      border: `1px solid ${palette.borderSoft}`,
                      color: palette.ink,
                    }}
                  />
                  {isQuant ? (
                    <span
                      className="col-span-7 text-sm text-left display-italic"
                      style={{ color: palette.inkMuted }}
                    >
                      {unit.trim() || "items"} total
                    </span>
                  ) : (
                    <>
                      <select
                        value={m.unit}
                        onChange={(e) =>
                          updateMilestone(m.id, { unit: e.target.value })
                        }
                        className="col-span-3 px-3 py-2.5 rounded-xl outline-none"
                        style={{
                          background: palette.bg,

                        <option value="days">days</option>

                      </select>
                      <span
                        className="col-span-4 text-sm text-center display-italic"

                  <input

            <button

function QuantityModal({ goal, dateStr, isToday, onSubmit, onClose }) {
  const [value, setValue] = useState("");

  useEffect(() => {
    setTimeout(() => inputRef.current?.focus(), 50);
  }, []);

  const submit = (e) => {
    if (e) e.preventDefault();
    const n = Number(value);
    if (!Number.isFinite(n) || n <= 0) return;
    onSubmit(n);
  };

  const unit = goal.unit || "items";
  const friendlyDate = isToday
    ? "today"

        weekday: "long",

    function AuthGate() {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [migrating, setMigrating] = useState(false);
      const [migrationDone, setMigrationDone] = useState(false);

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data }) => {
          if (!data.session) {
            window.location.replace(LOGIN_PATH);
            return;
          }
          setSession(data.session);
          setAuthLoading(false);
        });
        const { data: sub } = supabaseClient.auth.onAuthStateChange((evt, s) => {
          if (evt === "SIGNED_OUT" || !s) {
            window.location.replace(LOGIN_PATH);
            return;
          }
          setSession(s);
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      // One-time migration of legacy localStorage data when first signing in
      useEffect(() => {
        if (!session || migrationDone) return;
        const legacy = localStorage.getItem("goals-data");
        const migratedFlag = localStorage.getItem(`goals-data-migrated:${session.user.id}`);
        if (!legacy || migratedFlag) { setMigrationDone(true); return; }
        (async () => {
          setMigrating(true);
          try {
            const blob = JSON.parse(legacy);
            const cloud = await fetchAllRows(session.user.id);
            const cloudEmpty = cloud.habits.length === 0;
            if (cloudEmpty && (blob.goals?.length || 0) > 0) {
              await replaceAllRows(session.user.id, blob);
            }
            localStorage.setItem(`goals-data-migrated:${session.user.id}`, "1");
            localStorage.setItem("goals-data-legacy-backup", legacy);
            localStorage.removeItem("goals-data");
          } catch (e) {
            console.error("Migration failed:", e);
            alert("Migration of local habits to cloud failed: " + (e.message || e));
          } finally {
            setMigrating(false);
            setMigrationDone(true);
          }
        })();
      }, [session, migrationDone]);

      if (authLoading || !session) {
        return (
          <div
            className="min-h-screen flex items-center justify-center"
            style={{ background: palette.bg, color: palette.inkMuted,
                     fontFamily: fonts.display, fontSize: 24 }}
          >
            <span className="display-italic">opening your journal…</span>
          </div>
        );
      }

      if (migrating) {
        return (
          <div
            className="min-h-screen flex items-center justify-center px-6 text-center"
            style={{ background: palette.bg, color: palette.ink }}
          >
            <div>
              <div className="display" style={{ fontSize: 32, marginBottom: 8 }}>
                Moving your habits to the cloud…
              </div>
              <div className="display-italic" style={{ color: palette.inkMuted }}>
                One moment. This only happens once.
              </div>
            </div>
          </div>
        );
      }

      return (
        <>
          <GoalTracker key={session.user.id} session={session} />
          <HealthButton userId={session.user.id} />
          <SignOutButton email={session.user.email} />
        </>
      );
    }

    function HealthButton({ userId }) {
      const [open, setOpen] = useState(false);
      const [loading, setLoading] = useState(false);
      const [stats, setStats] = useState(null);
      const [error, setError] = useState(null);
      const [tick, setTick] = useState(0); // re-render trigger

      // Subscribe to sync status changes
      useEffect(() => {
        const fn = () => setTick((t) => t + 1);
        window.__syncStatus__.subscribers.add(fn);
        // Also tick every second so "X seconds ago" updates while panel open
        const interval = setInterval(() => setTick((t) => t + 1), 1000);
        return () => {
          window.__syncStatus__.subscribers.delete(fn);
          clearInterval(interval);
        };
      }, []);

      const refresh = async () => {
        setLoading(true);
        setError(null);
        const t0 = performance.now();
        try {
          const [h, m, c, r] = await Promise.all([
            supabaseClient.from("habits").select("id", { count: "exact", head: true }).eq("user_id", userId),
            supabaseClient.from("milestones").select("id", { count: "exact", head: true }).eq("user_id", userId),
            supabaseClient.from("check_ins").select("date", { count: "exact", head: true }).eq("user_id", userId),
            supabaseClient.from("attempt_resets").select("id", { count: "exact", head: true }).eq("user_id", userId),
          ]);
          const errs = [h.error, m.error, c.error, r.error].filter(Boolean);
          if (errs.length > 0) throw errs[0];
          const latency = Math.round(performance.now() - t0);
          setStats({
            habits: h.count ?? 0,
            milestones: m.count ?? 0,
            checkIns: c.count ?? 0,
            resets: r.count ?? 0,
            latency,
            checkedAt: new Date().toISOString(),
          });
        } catch (e) {
          setError(e.message || String(e));
        } finally {
          setLoading(false);
        }
      };

      // Auto-fetch when panel opens
      useEffect(() => {
        if (open) refresh();
      }, [open]);

      // Auto-refresh every 30s while open
      useEffect(() => {
        if (!open) return;
        const id = setInterval(refresh, 30000);
        return () => clearInterval(id);
      }, [open]);

      const status = window.__syncStatus__;
      const lastOk = status.lastOk;
      const lastErr = status.lastErr;
      const inFlight = status.inFlight;

      const ago = (iso) => {
        if (!iso) return "never";
        const sec = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
        if (sec < 5) return "just now";
        if (sec < 60) return `${sec}s ago`;
        if (sec < 3600) return `${Math.round(sec / 60)}m ago`;
        if (sec < 86400) return `${Math.round(sec / 3600)}h ago`;
        return `${Math.round(sec / 86400)}d ago`;
      };

      const overallState = (() => {
        if (inFlight > 0) return { color: palette.amber, label: "syncing…" };
        if (error || lastErr) return { color: palette.accent, label: "error" };
        if (stats || lastOk) return { color: palette.forest, label: "healthy" };
        return { color: palette.inkMuted, label: "idle" };
      })();

      return (
        <>
          <div className="fixed top-3 right-14 z-40">
            <button
              onClick={() => setOpen((v) => !v)}
              className="w-9 h-9 rounded-full flex items-center justify-center shadow-md relative transition-transform hover:scale-105"
              style={{
                background: palette.surface,
                border: `1px solid ${palette.border}`,
                color: palette.inkSoft,
              }}
              aria-label="Database health"
              title="Database health"
            >
              <Activity size={16} strokeWidth={2} />
              <span
                style={{
                  position: "absolute",
                  bottom: 1,
                  right: 1,
                  width: 8,
                  height: 8,
                  borderRadius: "50%",
                  background: overallState.color,
                  border: `2px solid ${palette.surface}`,
                }}
              />
            </button>
          </div>

          {open && (
            <>
              <div
                className="fixed inset-0 z-40"
                style={{ background: "rgba(61, 38, 56, 0.35)" }}
                onClick={() => setOpen(false)}
              />
              <div
                className="fixed z-50 rounded-3xl shadow-xl"
                style={{
                  top: 56,
                  right: 12,
                  width: "min(380px, calc(100vw - 24px))",
                  background: palette.surface,
                  border: `1px solid ${palette.border}`,
                  fontFamily: "'Manrope', system-ui, sans-serif",
                  color: palette.ink,
                }}
                onClick={(e) => e.stopPropagation()}
              >
                <div className="px-5 pt-5 pb-3 flex items-start justify-between gap-3">
                  <div>
                    <div
                      className="text-xs uppercase tracking-widest mb-1"
                      style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
                    >
                      Database health
                    </div>
                    <div
                      className="display text-2xl flex items-center gap-2"
                      style={{ color: palette.ink, fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600 }}
                    >
                      <span
                        style={{
                          display: "inline-block",
                          width: 10,
                          height: 10,
                          borderRadius: "50%",
                          background: overallState.color,
                        }}
                      />
                      {overallState.label}
                    </div>
                  </div>
                  <div className="flex gap-1">
                    <button
                      onClick={refresh}
                      disabled={loading}
                      className="w-8 h-8 rounded-full flex items-center justify-center transition-colors disabled:opacity-50"
                      style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
                      title="Refresh"
                    >
                      <RefreshCw size={14} strokeWidth={2} className={loading ? "animate-spin" : ""} />
                    </button>
                    <button
                      onClick={() => setOpen(false)}
                      className="w-8 h-8 rounded-full flex items-center justify-center"
                      style={{ background: palette.surfaceDeep, color: palette.inkSoft }}
                      aria-label="Close"
                    >
                      ✕
                    </button>
                  </div>
                </div>

                <div className="px-5 pb-5">
                  <div
                    className="rounded-2xl p-4 mb-3"
                    style={{ background: palette.bg, border: `1px solid ${palette.borderSoft}` }}
                  >
                    <div
                      className="text-[10px] uppercase tracking-widest mb-2"
                      style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
                    >
                      Last successful save
                    </div>
                    <div className="display text-xl" style={{ fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600 }}>
                      {ago(lastOk)}
                    </div>
                    {inFlight > 0 && (
                      <div className="text-xs mt-1" style={{ color: palette.amber, fontWeight: 500 }}>
                        {inFlight} write{inFlight !== 1 ? "s" : ""} in flight
                      </div>
                    )}
                  </div>

                  {lastErr && (
                    <div
                      className="rounded-2xl p-4 mb-3 flex gap-2 text-sm"
                      style={{
                        background: "rgba(216, 95, 135, 0.08)",
                        color: palette.accent,
                        border: `1px solid ${palette.accent}33`,
                      }}
                    >
                      <AlertCircle size={16} style={{ marginTop: 2, flexShrink: 0 }} />
                      <div>
                        <div style={{ fontWeight: 600 }}>Last sync error · {ago(lastErr.time)}</div>
                        <div className="text-xs mt-0.5" style={{ color: palette.inkSoft }}>
                          {lastErr.message}
                        </div>
                      </div>
                    </div>
                  )}

                  <div
                    className="rounded-2xl overflow-hidden"
                    style={{ background: palette.bg, border: `1px solid ${palette.borderSoft}` }}
                  >
                    <div
                      className="px-4 py-2 text-[10px] uppercase tracking-widest flex items-center justify-between"
                      style={{
                        color: palette.inkMuted,
                        letterSpacing: "0.2em",
                        background: palette.surfaceDeep,
                      }}
                    >
                      <span>Cloud row counts</span>
                      {stats && <span>{stats.latency}ms · {ago(stats.checkedAt)}</span>}
                    </div>
                    {loading && !stats ? (
                      <div className="p-4 text-sm display-italic" style={{ color: palette.inkMuted, fontFamily: "'Fraunces', Georgia, serif" }}>
                        querying supabase…
                      </div>
                    ) : error ? (
                      <div className="p-4 text-sm" style={{ color: palette.accent }}>
                        Couldn't reach Supabase: {error}
                      </div>
                    ) : stats ? (
                      <div className="divide-y" style={{ borderColor: palette.borderSoft }}>
                        <CountRow label="habits" value={stats.habits} />
                        <CountRow label="milestones" value={stats.milestones} />
                        <CountRow label="check-ins" value={stats.checkIns} />
                        <CountRow label="reset events" value={stats.resets} />
                      </div>
                    ) : null}
                  </div>

                  <div
                    className="text-xs mt-3 display-italic"
                    style={{ color: palette.inkMuted, fontFamily: "'Fraunces', Georgia, serif" }}
                  >
                    Every change saves to Supabase before the UI moves on. Auto-refreshing every 30s.
                  </div>
                </div>
              </div>
            </>
          )}
          <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .animate-spin { animation: spin 1s linear infinite; }`}</style>
        </>
      );
    }

    function CountRow({ label, value }) {
      return (
        <div
          className="px-4 py-2.5 flex items-center justify-between"
          style={{ borderTop: `1px solid ${palette.borderSoft}` }}
        >
          <span className="text-sm" style={{ color: palette.inkSoft }}>{label}</span>
          <span className="ticker" style={{ fontFamily: "'Fraunces', Georgia, serif", fontWeight: 600, fontSize: 18, color: palette.ink }}>
            {value}
          </span>
        </div>
      );
    }

    function SignOutButton({ email }) {
      const [open, setOpen] = useState(false);
      const [currentTheme, setCurrentTheme] = useState(getStoredTheme());
      const menuRef = useRef(null);

      // Close on outside click
      useEffect(() => {
        if (!open) return;
        const onDown = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) {
            setOpen(false);
          }
        };
        document.addEventListener("mousedown", onDown);
        document.addEventListener("touchstart", onDown);
        return () => {
          document.removeEventListener("mousedown", onDown);
          document.removeEventListener("touchstart", onDown);
        };
      }, [open]);

      const signOut = async () => {
        await supabaseClient.auth.signOut();
        window.location.replace(LOGIN_PATH);
      };

      const pickTheme = (key) => {
        applyTheme(key);
        setCurrentTheme(key);
        // Force a render of components that compute habit colors on mount
        // (most read getStoredTheme on each render so they auto-update).
      };

      return (
        <div
          ref={menuRef}
          className="fixed top-3 right-3 z-40"
          style={{ fontFamily: "var(--f-body)" }}
        >
          <button
            onClick={() => setOpen((v) => !v)}
            className="w-9 h-9 rounded-full flex items-center justify-center text-sm shadow-md transition-transform hover:scale-105"
            style={{
              background: palette.surface,
              border: `1px solid ${palette.border}`,
              color: palette.inkSoft,
            }}
            aria-label="Account & settings"
            title="Account & settings"
          >
            {email ? email[0].toUpperCase() : "·"}
          </button>

          {open && (
            <div
              className="absolute right-0 top-12 rounded-2xl shadow-xl overflow-hidden"
              style={{
                width: 280,
                background: palette.surface,
                border: `1px solid ${palette.border}`,
                color: palette.ink,
              }}
            >
              {/* Account section */}
              <div className="px-4 pt-4 pb-3" style={{ borderBottom: `1px solid ${palette.borderSoft}` }}>
                <div
                  className="text-[10px] uppercase tracking-widest mb-1"
                  style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
                >
                  Signed in
                </div>
                <div className="text-sm truncate" style={{ color: palette.inkSoft }}>
                  {email}
                </div>
              </div>

              {/* Theme picker */}
              <div className="px-4 py-3" style={{ borderBottom: `1px solid ${palette.borderSoft}` }}>
                <div
                  className="text-[10px] uppercase tracking-widest mb-2"
                  style={{ color: palette.inkMuted, letterSpacing: "0.2em" }}
                >
                  Theme
                </div>
                <div className="space-y-1">
                  {Object.entries(THEMES).map(([key, t]) => {
                    const active = key === currentTheme;
                    return (
                      <button
                        key={key}
                        onClick={() => pickTheme(key)}
                        className="w-full text-left px-3 py-2 rounded-xl flex items-center gap-3 transition-colors"
                        style={{
                          background: active ? palette.surfaceDeep : "transparent",
                          color: palette.ink,
                        }}
                      >
                        <div className="flex gap-1 shrink-0">
                          {t.habitColors.slice(0, 3).map((c, i) => (
                            <span
                              key={i}
                              style={{
                                display: "inline-block",
                                width: 10,
                                height: 10,
                                borderRadius: "50%",
                                background: c,
                              }}
                            />
                          ))}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-sm" style={{ fontWeight: active ? 600 : 500 }}>
                            {t.label}
                          </div>
                          <div
                            className="text-xs truncate"
                            style={{ color: palette.inkMuted }}
                          >
                            {t.description}
                          </div>
                        </div>
                        {active && (
                          <Check size={14} strokeWidth={3} style={{ color: palette.accent, flexShrink: 0 }} />
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Sign out */}
              <div className="px-4 py-3">
                <button
                  onClick={signOut}
                  className="w-full px-4 py-2 rounded-full text-sm font-medium"
                  style={{ background: palette.accent, color: palette.surface }}
                >
                  Sign out
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── Mount ────────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AuthGate />);
  </script>
</body>
</html>
