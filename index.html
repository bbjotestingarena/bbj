<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#FBEDF1" />
  <title>Sign in · your habits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script>
    /* Read theme so the login page matches the user's choice. Defaults to 'soft'. */
    (function () {
      const themes = {
        soft:  { bg:"#FBEDF1", surface:"#FFF5F8", ink:"#3D2638", inkSoft:"#664756", inkMuted:"#9B7989", accent:"#D85F87", border:"#E8C9D5", borderSoft:"#F0DBE3", display:"'Fraunces', Georgia, serif", body:"'Manrope', system-ui, sans-serif", italic:true, fontUrl:"https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500&display=swap" },
        sharp: { bg:"#EEF1F4", surface:"#FFFFFF", ink:"#0F1B26", inkSoft:"#2C3E4F", inkMuted:"#6B7B8A", accent:"#0E6E7A", border:"#C7D1DA", borderSoft:"#DCE2E8", display:"'Inter', system-ui, sans-serif", body:"'Inter', system-ui, sans-serif", italic:false, fontUrl:"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" },
        plain: { bg:"#F5F1EA", surface:"#FFFCF5", ink:"#2A2620", inkSoft:"#4F4940", inkMuted:"#867E70", accent:"#7A4E36", border:"#D5CCB9", borderSoft:"#E2D9C6", display:"'Newsreader', Georgia, serif", body:"'Manrope', system-ui, sans-serif", italic:false, fontUrl:"https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Newsreader:wght@500;600&display=swap" },
      };
      let key = "soft";
      try { const t = localStorage.getItem("theme"); if (themes[t]) key = t; } catch (e) {}
      const T = themes[key];
      const link = document.createElement("link"); link.rel="stylesheet"; link.href=T.fontUrl; document.head.appendChild(link);
      const meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.content = T.bg;
      const r = document.documentElement;
      r.style.setProperty("--lc-bg", T.bg);
      r.style.setProperty("--lc-surface", T.surface);
      r.style.setProperty("--lc-ink", T.ink);
      r.style.setProperty("--lc-ink-soft", T.inkSoft);
      r.style.setProperty("--lc-ink-muted", T.inkMuted);
      r.style.setProperty("--lc-accent", T.accent);
      r.style.setProperty("--lc-border", T.border);
      r.style.setProperty("--lc-border-soft", T.borderSoft);
      r.style.setProperty("--lc-display", T.display);
      r.style.setProperty("--lc-body", T.body);
      r.style.setProperty("--lc-accent-style", T.italic ? "italic" : "normal");
      r.style.setProperty("--lc-accent-weight", T.italic ? "500" : "600");
    })();
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--lc-bg);
      color: var(--lc-ink);
      font-family: var(--lc-body);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-tap-highlight-color: transparent;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--lc-surface);
      border: 1px solid var(--lc-border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 28px -18px rgba(0, 0, 0, 0.12);
    }
    .small-cap {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--lc-ink-muted);
      margin-bottom: 8px;
    }
    h1 {
      font-family: var(--lc-display);
      font-weight: 600;
      font-size: 36px;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin: 0 0 24px;
    }
    h1 .accent {
      color: var(--lc-accent);
      font-style: var(--lc-accent-style);
      font-weight: var(--lc-accent-weight);
    }
    label {
      display: block;
      margin-bottom: 16px;
    }
    label.last { margin-bottom: 20px; }
    .lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--lc-ink-muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--lc-bg);
      border: 1px solid var(--lc-border-soft);
      color: var(--lc-ink);
      font-family: var(--lc-body);
      font-size: 16px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--lc-accent); }
    button {
      width: 100%;
      padding: 14px;
      background: var(--lc-ink);
      color: var(--lc-bg);
      font-family: var(--lc-body);
      font-weight: 500;
      font-size: 15px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err {
      background: rgba(160, 67, 42, 0.1);
      color: var(--lc-accent);
      border: 1px solid rgba(160, 67, 42, 0.3);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .footnote {
      margin-top: 20px;
      text-align: center;
      font-family: var(--lc-display);
      font-style: italic;
      font-size: 12px;
      color: var(--lc-ink-muted);
    }
    .loading {
      text-align: center;
      font-family: var(--lc-display);
      font-style: italic;
      color: var(--lc-ink-muted);
      font-size: 18px;
    }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <div class="loading" id="loading">opening your journal…</div>

  <form class="card hide" id="login-form" autocomplete="on">
    <div class="small-cap">Sign in</div>
    <h1>your <span class="accent">habits</span>,<br />everywhere.</h1>

    <div id="error" class="err hide"></div>

    <label>
      <div class="lbl">Email</div>
      <input type="email" id="email" required autocomplete="email" />
    </label>
    <label class="last">
      <div class="lbl">Password</div>
      <input type="password" id="password" required autocomplete="current-password" />
    </label>

    <button type="submit" id="submit">Sign in</button>

    <div class="footnote">Personal use. Account managed by your friendly admin.</div>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://oubfzwqbcjainmeefqpb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_jr6gAFb0h-7s922GWpYlHQ_eA1XKDgk";
    const APP_PATH = "tracker.html";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true },
    });

    const loadingEl = document.getElementById("loading");
    const formEl = document.getElementById("login-form");
    const errEl = document.getElementById("error");
    const btn = document.getElementById("submit");

    // If already signed in, skip the form and go straight to the app
    supabaseClient.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.replace(APP_PATH);
      } else {
        loadingEl.classList.add("hide");
        formEl.classList.remove("hide");
      }
    });

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.classList.add("hide");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove("hide");
        btn.disabled = false;
        btn.textContent = "Sign in";
      } else {
        window.location.replace(APP_PATH);
      }
    });
  </script>
</body>
</html>
